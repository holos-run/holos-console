---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: templatepolicies.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: TemplatePolicy
    listKind: TemplatePolicyList
    plural: templatepolicies
    shortNames:
    - tpol
    singular: templatepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.rules[*]
      name: Rules
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TemplatePolicy declares Require/Exclude rules over Template references.
          Policies live only in namespaces whose `console.holos.run/resource-type`
          label is `organization` or `folder`; creation in a project-annotated
          namespace is rejected by the ValidatingAdmissionPolicy shipped alongside
          this CRD (see config/admission/).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TemplatePolicySpec describes the desired state of a TemplatePolicy.
            properties:
              description:
                description: Description explains what the policy enforces.
                type: string
              displayName:
                description: DisplayName is a human-readable name for UI presentation.
                type: string
              rules:
                description: |-
                  Rules are the Require/Exclude rules this policy enforces. Rules are
                  evaluated independently and their effects combine in the
                  render-time resolver.
                items:
                  description: |-
                    TemplatePolicyRule binds a kind and a template reference into a single rule.
                    A TemplatePolicy may carry many rules; which render targets a rule applies
                    to is decided entirely by TemplatePolicyBinding objects.
                  properties:
                    kind:
                      description: Kind is Require or Exclude.
                      enum:
                      - Require
                      - Exclude
                      type: string
                    template:
                      description: |-
                        Template identifies the template this rule applies to. The
                        referenced template may live in any scope the owning policy's
                        scope can reach.
                      properties:
                        name:
                          description: Name is the linked template's DNS label slug.
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace is the Kubernetes namespace that
                            owns the linked template.
                          minLength: 1
                          type: string
                        versionConstraint:
                          description: |-
                            VersionConstraint is a semver range string (for example
                            `">=2.0.0 <3.0.0"`) that restricts which release versions of the
                            linked template are compatible. Empty means no constraint; the
                            latest version is used.
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                  required:
                  - kind
                  - template
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
            required:
            - rules
            type: object
          status:
            description: |-
              TemplatePolicyStatus describes the observed state of a TemplatePolicy.
              Follows the Gateway-API status pattern recorded in ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  TemplatePolicy's state. Known condition types are Accepted and
                  Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  TemplatePolicy by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
