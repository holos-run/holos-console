---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: templates.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: Template
    listKind: TemplateList
    plural: templates
    shortNames:
    - tmpl
    singular: template
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Template is a CUE template that produces Kubernetes resource manifests.
          Templates live in a namespace whose `console.holos.run/resource-type` label
          identifies the hierarchy level (organization, folder, project). Project-scope
          templates are the only kind for which `.spec.defaults` is meaningful.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemplateSpec describes the desired state of a Template. The spec carries the
              existing CUE template payload field-for-field — no CUE schema change relative
              to the former ConfigMap-backed storage. See ADR 030.
            properties:
              cueTemplate:
                description: CueTemplate is the CUE source code the render path evaluates.
                type: string
              defaults:
                description: |-
                  Defaults provides optional default values for deployment form
                  fields. Only meaningful for project-scope templates.
                properties:
                  args:
                    description: Args overrides the container image CMD.
                    items:
                      type: string
                    type: array
                  command:
                    description: Command overrides the container image ENTRYPOINT.
                    items:
                      type: string
                    type: array
                  description:
                    description: Description is a short human-readable description
                      of the deployment.
                    type: string
                  env:
                    description: Env sets default container environment variables.
                    items:
                      description: |-
                        EnvVar is a name/value pair carried on TemplateDefaults. Mirrors the shape
                        of the existing proto EnvVar used by deployments — kept minimal here so the
                        CRD schema validates the small default-value surface without pulling a
                        separate Kubernetes-style EnvVar type (which would force valueFrom handling
                        the template defaults path does not use).
                      properties:
                        name:
                          description: Name of the environment variable.
                          minLength: 1
                          type: string
                        value:
                          description: Value of the environment variable. Optional.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  image:
                    description: Image is the default container image.
                    type: string
                  name:
                    description: Name is the default deployment name.
                    type: string
                  port:
                    description: Port is the default container port the application
                      listens on.
                    format: int32
                    maximum: 65535
                    minimum: 0
                    type: integer
                  tag:
                    description: Tag is the default image tag.
                    type: string
                type: object
              description:
                description: Description explains what the template produces.
                type: string
              displayName:
                description: DisplayName is a human-readable name.
                type: string
              enabled:
                description: |-
                  Enabled controls whether this template is eligible to appear in
                  selection lists and to participate in render-time unification.
                  Disabled templates are filtered out of linkable-template pickers
                  and out of the effective unification set computed when rendering
                  a downstream template or deployment.
                type: boolean
              linkedTemplates:
                description: |-
                  LinkedTemplates lists templates in ancestor scopes to unify with
                  this template at render time. Ancestor templates forced onto a
                  project by a TemplatePolicy REQUIRE rule always unify regardless
                  of this list.
                items:
                  description: |-
                    LinkedTemplateRef is a scope-qualified reference to another Template used
                    in the explicit linking list. The `scope` / `scopeName` pair is retained
                    on the stored CRD shape for compatibility with persisted data and with
                    the Go storage adapters; the proto wire shape is already namespace-only
                    (HOL-619). A future migration collapses this to a single (namespace,
                    name) pair in lockstep with rewriting the storage adapters that still
                    read and write the discriminator.
                  properties:
                    name:
                      description: Name is the linked template's DNS label slug.
                      minLength: 1
                      type: string
                    scope:
                      description: |-
                        Scope identifies the hierarchy level of the linked template.
                        Valid values: "organization", "folder", "project".
                      enum:
                      - organization
                      - folder
                      - project
                      type: string
                    scopeName:
                      description: |-
                        ScopeName is the organization, folder, or project name owning the
                        linked template.
                      minLength: 1
                      type: string
                    versionConstraint:
                      description: |-
                        VersionConstraint is a semver range string (for example
                        `">=2.0.0 <3.0.0"`) that restricts which release versions of the
                        linked template are compatible. Empty means no constraint; the
                        latest version is used.
                      type: string
                  required:
                  - name
                  - scope
                  - scopeName
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              version:
                description: |-
                  Version is the current semver version string (for example "1.2.3")
                  of this template. Empty means the template has no published
                  version yet.
                type: string
            type: object
          status:
            description: |-
              TemplateStatus describes the observed state of a Template. Follows the
              Gateway-API status pattern recorded in ADR 030: each condition carries its
              own observedGeneration; the top-level observedGeneration tracks
              metadata.generation.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  Template's state. Known condition types are Accepted, CUEValid,
                  LinkedRefsResolved, and Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  Template by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
