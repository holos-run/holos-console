---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: templatereleases.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: TemplateRelease
    listKind: TemplateReleaseList
    plural: templatereleases
    shortNames:
    - tmplrel
    singular: templaterelease
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.templateName
      name: Template
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TemplateRelease snapshots a published version of a Template. The owning
          Template and the release share a namespace; the release's
          `.spec.templateName` identifies the Template and `.spec.version` identifies
          the semver version. The resource name is a deterministic function of those
          two fields (see console/templates.ReleaseObjectName).

          The spec is immutable after creation (see the CEL rule on Spec). This
          mirrors the `Immutable: true` guarantee the retired release ConfigMaps
          offered: published releases are a version pin, so rewriting their CUE
          payload in place would silently break downstream template references that
          resolved against an earlier snapshot.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemplateReleaseSpec describes an immutable, published version of a Template.
              A TemplateRelease snapshots the CUE payload, defaults, and authoring notes
              (changelog, upgrade advice) from a Template at publish time. The object is
              intended to be treated as append-only: once created for a given
              (templateName, version) tuple, its spec should not change.
            properties:
              changelog:
                description: |-
                  Changelog is a free-form description of what changed in this
                  release relative to the prior one.
                type: string
              cueTemplate:
                description: |-
                  CueTemplate is the CUE source snapshot the render path evaluates
                  when resolving a versioned reference to this release.
                type: string
              defaults:
                description: |-
                  Defaults snapshots the Template's defaults at publish time. Only
                  meaningful for project-scope templates.
                properties:
                  args:
                    description: Args overrides the container image CMD.
                    items:
                      type: string
                    type: array
                  command:
                    description: Command overrides the container image ENTRYPOINT.
                    items:
                      type: string
                    type: array
                  description:
                    description: Description is a short human-readable description
                      of the deployment.
                    type: string
                  env:
                    description: Env sets default container environment variables.
                    items:
                      description: |-
                        EnvVar is a name/value pair carried on TemplateDefaults. Mirrors the shape
                        of the existing proto EnvVar used by deployments — kept minimal here so the
                        CRD schema validates the small default-value surface without pulling a
                        separate Kubernetes-style EnvVar type (which would force valueFrom handling
                        the template defaults path does not use).
                      properties:
                        name:
                          description: Name of the environment variable.
                          minLength: 1
                          type: string
                        value:
                          description: Value of the environment variable. Optional.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  image:
                    description: Image is the default container image.
                    type: string
                  name:
                    description: Name is the default deployment name.
                    type: string
                  port:
                    description: Port is the default container port the application
                      listens on.
                    format: int32
                    maximum: 65535
                    minimum: 0
                    type: integer
                  tag:
                    description: Tag is the default image tag.
                    type: string
                type: object
              templateName:
                description: |-
                  TemplateName is the DNS label slug of the Template this release
                  snapshots. Releases live in the same namespace as the owning
                  Template.
                minLength: 1
                type: string
              upgradeAdvice:
                description: |-
                  UpgradeAdvice is a free-form description of steps operators must
                  take to upgrade downstream consumers to this release.
                type: string
              version:
                description: |-
                  Version is the semver string (for example "1.2.3") identifying
                  this release.
                minLength: 1
                type: string
            required:
            - templateName
            - version
            type: object
            x-kubernetes-validations:
            - message: TemplateRelease spec is immutable after creation
              rule: self == oldSelf
          status:
            description: |-
              TemplateReleaseStatus describes the observed state of a TemplateRelease.
              Follows the Gateway-API status pattern recorded in ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  TemplateRelease's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  TemplateRelease by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
