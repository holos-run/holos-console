---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: templatepolicybindings.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: TemplatePolicyBinding
    listKind: TemplatePolicyBindingList
    plural: templatepolicybindings
    shortNames:
    - tpb
    singular: templatepolicybinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="ResolvedRefs")].status
      name: Resolved
      type: string
    - jsonPath: .spec.policyRef.name
      name: Policy
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TemplatePolicyBinding binds a single TemplatePolicy to an explicit list of
          project templates and/or deployments (ADR 029 / HOL-590). Bindings live
          only in namespaces whose `console.holos.run/resource-type` label is
          `organization` or `folder`; creation in a project-annotated namespace is
          rejected by the ValidatingAdmissionPolicy shipped alongside this CRD
          (see config/admission/).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemplatePolicyBindingSpec describes the desired state of a
              TemplatePolicyBinding. target_refs carries the HOL-590 binding contract
              unchanged.
            properties:
              description:
                description: Description explains what the binding attaches and why.
                type: string
              displayName:
                description: DisplayName is a human-readable name for UI presentation.
                type: string
              policyRef:
                description: |-
                  PolicyRef identifies the TemplatePolicy this binding attaches. A
                  binding references exactly one policy; use multiple bindings to
                  attach multiple policies to overlapping target sets.
                properties:
                  name:
                    description: Name is the referenced TemplatePolicy's DNS label
                      slug.
                    minLength: 1
                    type: string
                  scope:
                    description: |-
                      Scope identifies the hierarchy level owning the referenced policy.
                      Only "organization" and "folder" are valid — TemplatePolicy cannot
                      live at project scope.
                    enum:
                    - organization
                    - folder
                    type: string
                  scopeName:
                    description: |-
                      ScopeName is the organization or folder name owning the referenced
                      policy.
                    minLength: 1
                    type: string
                required:
                - name
                - scope
                - scopeName
                type: object
              targetRefs:
                description: |-
                  TargetRefs enumerates every render target the referenced policy
                  applies to. Order is not significant; duplicates (same
                  (kind, projectName, name) triple) are rejected by the reconciler.
                items:
                  description: |-
                    TemplatePolicyBindingTargetRef identifies one explicit render target a
                    binding attaches its policy to. Project-scope resources are disambiguated
                    by (projectName, name).
                  properties:
                    kind:
                      description: Kind discriminates between ProjectTemplate and
                        Deployment targets.
                      enum:
                      - ProjectTemplate
                      - Deployment
                      type: string
                    name:
                      description: Name is the target's DNS label slug within projectName.
                      minLength: 1
                      type: string
                    projectName:
                      description: ProjectName is the project that owns the target.
                      minLength: 1
                      type: string
                  required:
                  - kind
                  - name
                  - projectName
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
            required:
            - policyRef
            - targetRefs
            type: object
          status:
            description: |-
              TemplatePolicyBindingStatus describes the observed state of a
              TemplatePolicyBinding. Follows the Gateway-API status pattern recorded in
              ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  TemplatePolicyBinding's state. Known condition types are Accepted,
                  ResolvedRefs, and Ready. The ResolvedRefs condition name and
                  reason string are deliberately identical to the Gateway API
                  HTTPRoute.status ResolvedRefs condition — platform operators
                  already understand its meaning.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  TemplatePolicyBinding by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
