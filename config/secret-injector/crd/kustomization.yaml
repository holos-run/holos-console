# CRD base for secrets.holos.run/v1alpha1. Files in this directory are
# generated by `make manifests-secrets`; hand-edits will be overwritten.
# Consumed by ../cluster-scoped/ (applied by cluster admins).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- secrets.holos.run_credentials.yaml
- secrets.holos.run_secretinjectionpolicies.yaml
- secrets.holos.run_secretinjectionpolicybindings.yaml
- secrets.holos.run_upstreamsecrets.yaml
