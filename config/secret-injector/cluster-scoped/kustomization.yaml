# Cluster-scoped overlay for holos-secret-injector. Installs every
# cluster-wide resource the service needs: CRDs, ValidatingAdmission
# Policies, the generated ClusterRole + opt-in viewer ClusterRole, and
# the ClusterRoleBinding that attaches the controller SA.
#
#   kubectl apply -k config/secret-injector/cluster-scoped/
#
# The namespace-scoped overlay (../namespace-scoped/) must be applied
# separately and should land FIRST so the ServiceAccount referenced by
# this overlay's ClusterRoleBinding already exists. A missing-subject
# binding is legal in K8s (the binding just grants nothing until the SA
# is created) but SA-first avoids a transient window where the
# controller has no bound identity.
#
# Resources are referenced as kustomize bases (directory paths), not
# as individual file paths, because kubectl's default kustomize load
# restriction forbids cross-directory file references. Each base
# directory carries its own kustomization.yaml that enumerates its
# files; add a file to a base and it flows through to this overlay
# without edits here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
# CRDs — the secrets.holos.run API surface.
- ../crd
# ValidatingAdmissionPolicies — scope-escape and cross-tenant guards.
- ../admission
# Cluster-scoped RBAC — ClusterRole, viewer ClusterRole, ClusterRoleBinding.
- ../rbac/cluster
