# ServiceAccount the holos-secret-injector controller runs as. Lives in
# the `holos-system` namespace because the namespace-scope-label-
# immutable admission policy (config/secret-injector/admission/
# namespace-scope-label-immutable.yaml) hard-codes
# `system:serviceaccount:holos-system:platform-controller` as the
# platform-controller exemption; co-locating the secret-injector SA in
# the same namespace avoids introducing a second system namespace for
# M1. The SA name differs from the platform-controller SA — the
# secret-injector reconciles its own CRDs and does NOT need the
# platform-controller's namespace-label-mutation exemption.
#
# M1 ships only the SA (plus the bindings that empower it). The M2
# Deployment + Service that run this SA land in HOL-670 successor
# tickets per the parent plan (HOL-675).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: holos-secret-injector
  namespace: holos-system
