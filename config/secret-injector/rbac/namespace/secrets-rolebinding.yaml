# RoleBinding in the holos-system namespace that grants the
# holos-secret-injector ServiceAccount the CUD verbs on core/v1 Secret
# defined in secrets-namespace-role.yaml. Scoped to this single
# namespace — the binding cannot escape to other namespaces because
# RoleBindings are namespace-local by definition.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: holos-secret-injector-secrets
  namespace: holos-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: holos-secret-injector-secrets
subjects:
- kind: ServiceAccount
  name: holos-secret-injector
  namespace: holos-system
