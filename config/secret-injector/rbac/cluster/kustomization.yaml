# Cluster-scoped RBAC base for holos-secret-injector. role.yaml is
# generated by `make manifests-secrets` from kubebuilder RBAC markers
# in internal/secretinjector/controller/rbac.go; viewer-role.yaml and
# rolebinding.yaml are hand-authored. Consumed by ../../cluster-scoped/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- role.yaml
- viewer-role.yaml
- rolebinding.yaml
