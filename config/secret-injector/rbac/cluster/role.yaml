---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holos-secret-injector
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - secrets.holos.run
  resources:
  - credentials
  - secretinjectionpolicies
  - secretinjectionpolicybindings
  - upstreamsecrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - secrets.holos.run
  resources:
  - credentials/finalizers
  - secretinjectionpolicies/finalizers
  - secretinjectionpolicybindings/finalizers
  - upstreamsecrets/finalizers
  verbs:
  - update
- apiGroups:
  - secrets.holos.run
  resources:
  - credentials/status
  - secretinjectionpolicies/status
  - secretinjectionpolicybindings/status
  - upstreamsecrets/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - security.istio.io
  resources:
  - authorizationpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
