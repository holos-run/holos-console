# Consolidated namespace-scoped overlay. Apply BEFORE ../cluster-scoped/ so
# ServiceAccounts exist before their ClusterRoleBindings.
#
#   kubectl apply -k config/namespace-scoped/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../holos-console/namespace-scoped
- ../secret-injector/namespace-scoped
