# Cluster-scoped RBAC base for holos-console. role.yaml is generated by
# `make manifests` from kubebuilder RBAC markers in internal/controller/rbac.go;
# the ClusterRoleBinding is hand-authored. Consumed by ../cluster-scoped/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- role.yaml
- role_binding.yaml
