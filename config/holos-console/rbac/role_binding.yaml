# ClusterRoleBinding linking the holos-console ServiceAccount to the
# generated holos-console-templates ClusterRole. This grants exactly the
# rules generated from internal/controller/rbac.go; it does not bind the
# broader cluster-admin role and it does not target system:serviceaccounts.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holos-console-templates
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: holos-console-templates
subjects:
- kind: ServiceAccount
  name: holos-console
  namespace: holos-system
