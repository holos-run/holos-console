---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holos-console-templates
rules:
# Metadata stores and rendered core resources: ConfigMaps hold legacy
# deployment/template metadata; Secrets and Services are emitted by the
# deployment apply pipeline and need SSA patch plus cleanup delete.
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Controller Events are emitted for reconcile diagnostics.
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
# ADR 036 impersonation for user/group/serviceaccount access checks.
- apiGroups:
  - ""
  resources:
  - groups
  - serviceaccounts
  - users
  verbs:
  - impersonate
# Namespace reads power hierarchy resolution and selected resource context.
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# ServiceAccounts are both impersonation subjects and rendered resources; SSA
# apply/cleanup requires create/get/list/watch/patch/update/delete.
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - impersonate
  - list
  - patch
  - update
  - watch
# apps/v1 Deployments are rendered resources managed by SSA apply and cleanup.
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# deployments.holos.run Deployments are the source CRs.
- apiGroups:
  - deployments.holos.run
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Deployment status updates publish Accepted, Rendered, and Applied conditions.
- apiGroups:
  - deployments.holos.run
  resources:
  - deployments/status
  verbs:
  - get
  - patch
  - update
# Finalizer updates let the Deployment controller clean up rendered resources
# before direct CR deletion completes.
- apiGroups:
  - deployments.holos.run
  resources:
  - deployments/finalizers
  verbs:
  - update
# Gateway API HTTPRoutes and ReferenceGrants are rendered resources managed by
# server-side apply and cleanup.
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  - referencegrants
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# RoleBindings are reconciled for resource RBAC and may also be rendered; list
# and delete support cleanup of stale owned bindings.
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - rolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Roles are reconciled for resource RBAC and may also be rendered. bind/escalate
# are required for the existing console-owned RBAC bootstrap flow.
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - roles
  verbs:
  - bind
  - create
  - delete
  - escalate
  - get
  - list
  - patch
  - update
  - watch
# Template-family CRDs are reconciled by the embedded controller and read by the
# render-time policy resolver.
- apiGroups:
  - templates.holos.run
  resources:
  - renderstates
  - templatedependencies
  - templatepolicies
  - templatepolicybindings
  - templatereleases
  - templaterequirements
  - templates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Finalizer updates are scoped to controller-owned template-family CRDs.
- apiGroups:
  - templates.holos.run
  resources:
  - renderstates/finalizers
  - templatedependencies/finalizers
  - templatepolicies/finalizers
  - templatepolicybindings/finalizers
  - templatereleases/finalizers
  - templaterequirements/finalizers
  - templates/finalizers
  verbs:
  - update
# Status writes publish Gateway-style conditions on template-family CRDs.
- apiGroups:
  - templates.holos.run
  resources:
  - renderstates/status
  - templatedependencies/status
  - templategrants/status
  - templatepolicies/status
  - templatepolicybindings/status
  - templatereleases/status
  - templaterequirements/status
  - templates/status
  verbs:
  - get
  - patch
  - update
# TemplateGrant specs are read-only to the controller; writes stay behind the
# TemplateGrant RPC surface.
- apiGroups:
  - templates.holos.run
  resources:
  - templategrants
  verbs:
  - get
  - list
  - watch
