# TemplatePolicyBinding mirrors the TemplatePolicy isolation invariant: a
# binding that declares who-applies-to-what is admin-scoped and lives only in
# an organization or folder namespace (ADR 029, HOL-554). This policy enforces
# that contract at API-server admission time so the handler-side guard can be
# removed later without reopening the hole.
#
# See config/holos-console/admission/templatepolicy-folder-or-org-only.yaml for the full
# rationale on namespace classification and the
# `console.holos.run/resource-type` label.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: templatepolicybinding-folder-or-org-only
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["templates.holos.run"]
      apiVersions: ["v1alpha1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["templatepolicybindings"]
  validations:
  - expression: >-
      !has(namespaceObject.metadata.labels)
      || !("console.holos.run/resource-type" in namespaceObject.metadata.labels)
      || namespaceObject.metadata.labels["console.holos.run/resource-type"] != "project"
    messageExpression: >-
      "TemplatePolicyBinding cannot be stored in project namespace " + namespaceObject.metadata.name +
      "; use the owning folder or organization namespace (see HOL-554)."
    reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: templatepolicybinding-folder-or-org-only
spec:
  policyName: templatepolicybinding-folder-or-org-only
  validationActions:
  - Deny
  matchResources:
    resourceRules:
    - apiGroups: ["templates.holos.run"]
      apiVersions: ["v1alpha1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["templatepolicybindings"]
