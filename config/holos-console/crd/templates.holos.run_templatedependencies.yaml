---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: templatedependencies.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: TemplateDependency
    listKind: TemplateDependencyList
    plural: templatedependencies
    shortNames:
    - tdep
    singular: templatedependency
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="ResolvedRefs")].status
      name: Resolved
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TemplateDependency records a dependency between two Templates: Dependent
          requires Requires. The reconciler uses this to gate render passes and to
          implement optional cascade-delete semantics.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemplateDependencySpec describes the desired state of a TemplateDependency.
              A TemplateDependency records that a Dependent template requires a Requires
              template to be rendered first (or in the same render pass). When
              CascadeDelete is true (the default) deleting the Requires template causes
              the Dependent template to be deleted as well.
            properties:
              cascadeDelete:
                default: true
                description: |-
                  CascadeDelete controls whether deleting the Requires template
                  triggers deletion of the Dependent template. Defaults to true when
                  nil, matching the safest conservative posture: dependencies are
                  owner-like relationships unless explicitly decoupled.
                type: boolean
              dependent:
                description: |-
                  Dependent identifies the template that depends on Requires. The
                  template must live in the same namespace as the TemplateDependency.
                properties:
                  name:
                    description: Name is the linked template's DNS label slug.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the Kubernetes namespace that owns the
                      linked template.
                    minLength: 1
                    type: string
                  versionConstraint:
                    description: |-
                      VersionConstraint is a semver range string (for example
                      `">=2.0.0 <3.0.0"`) that restricts which release versions of the
                      linked template are compatible. Empty means no constraint; the
                      latest version is used.
                    type: string
                required:
                - name
                - namespace
                type: object
              requires:
                description: |-
                  Requires identifies the template that Dependent needs. The template
                  may live in any namespace reachable via a TemplateGrant.
                properties:
                  name:
                    description: Name is the linked template's DNS label slug.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the Kubernetes namespace that owns the
                      linked template.
                    minLength: 1
                    type: string
                  versionConstraint:
                    description: |-
                      VersionConstraint is a semver range string (for example
                      `">=2.0.0 <3.0.0"`) that restricts which release versions of the
                      linked template are compatible. Empty means no constraint; the
                      latest version is used.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - dependent
            - requires
            type: object
          status:
            description: |-
              TemplateDependencyStatus describes the observed state of a
              TemplateDependency. Follows the Gateway-API status pattern recorded in
              ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  TemplateDependency's state. Known condition types are Accepted,
                  ResolvedRefs, and Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  TemplateDependency by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
