    controller-gen.kubebuilder.io/version: v0.20.1
  name: templategrants.templates.holos.run
spec:
  group: templates.holos.run
  names:
    categories:
    - holos
    kind: TemplateGrant
    listKind: TemplateGrantList
    plural: templategrants
    shortNames:
    - tg
    singular: templategrant
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TemplateGrant authorizes cross-namespace template references, mirroring
          the Gateway API ReferenceGrant pattern. A TemplateGrant lives in the
          namespace that owns the templates being referenced; without a TemplateGrant
          in the owning namespace a cross-namespace LinkedTemplateRef is denied.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TemplateGrantSpec describes the desired state of a TemplateGrant.
              A TemplateGrant lives in the namespace that owns the templates being shared
              (the "from" side) and names one or more source namespaces that are allowed
              to reference those templates.
            properties:
              from:
                description: |-
                  From lists the namespaces whose template references are authorized by
                  this grant. An empty list denies all cross-namespace references.
                items:
                  description: |-
                    TemplateGrantFromRef identifies the namespace(s) that are permitted to
                    reference templates owned by the TemplateGrant's namespace. Mirrors the
                    Gateway API ReferenceGrant From structure.

                    Exactly one of Namespace or NamespaceSelector must be set, unless Namespace
                    is the literal wildcard "*", in which case NamespaceSelector is ignored.
                  properties:
                    namespace:
                      description: |-
                        Namespace is the Kubernetes namespace from which cross-namespace
                        template references are allowed. Use the literal wildcard "*" to
                        permit all namespaces. Must be non-empty.
                      minLength: 1
                      type: string
                    namespaceSelector:
                      description: |-
                        NamespaceSelector is a label selector applied to namespaces when
                        Namespace is not the literal wildcard "*". Only namespaces matching
                        this selector AND whose name equals Namespace (or when Namespace is
                        "*") are permitted. Optional.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                  required:
                  - namespace
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              to:
                description: |-
                  To optionally narrows which templates in this namespace may be
                  referenced. When omitted, all templates in the namespace are
                  reachable by the permitted From namespaces.
                items:
                  description: |-
                    LinkedTemplateRef is a (namespace, name) reference to another Template.
                    The namespace's `console.holos.run/resource-type` label classifies the
                    linked template's hierarchy kind at render time — callers supply the
                    namespace only. Used in TemplatePolicyBinding rules and RenderState.
                  properties:
                    name:
                      description: Name is the linked template's DNS label slug.
                      minLength: 1
                      type: string
                    namespace:
                      description: Namespace is the Kubernetes namespace that owns
                        the linked template.
                      minLength: 1
                      type: string
                    versionConstraint:
                      description: |-
                        VersionConstraint is a semver range string (for example
                        `">=2.0.0 <3.0.0"`) that restricts which release versions of the
                        linked template are compatible. Empty means no constraint; the
                        latest version is used.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            required:
            - from
            type: object
          status:
            description: |-
              TemplateGrantStatus describes the observed state of a TemplateGrant.
              Follows the Gateway-API status pattern recorded in ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  TemplateGrant's state. Known condition types are Accepted and Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  TemplateGrant by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
