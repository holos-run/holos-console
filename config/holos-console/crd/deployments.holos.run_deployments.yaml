---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: deployments.deployments.holos.run
spec:
  group: deployments.holos.run
  names:
    categories:
    - holos
    kind: Deployment
    listKind: DeploymentList
    plural: deployments
    shortNames:
    - dep
    singular: deployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.projectName
      name: Project
      type: string
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.tag
      name: Tag
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Deployment represents a deployed application instance managed by the
          holos-console controller. The CRD shape mirrors the existing proto-defined
          Deployment message so both the ConfigMap-backed proto store and the CR can
          coexist during the dual-write transition introduced in HOL-957 (Phase 3).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DeploymentSpec describes the desired state of a Deployment. The spec
              captures the existing proto-defined Deployment shape field-for-field so
              both the proto store and the CR can coexist during the dual-write
              transition (Phase 3, HOL-957). Fields are derived from
              proto/holos/console/v1/deployments.proto and console/deployments/handler.go.
            properties:
              args:
                description: Args overrides the container image CMD.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              command:
                description: Command overrides the container image ENTRYPOINT.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              description:
                description: Description explains the deployment's purpose.
                type: string
              displayName:
                description: DisplayName is a human-readable name for UI presentation.
                type: string
              image:
                description: Image is the container image.
                type: string
              port:
                description: Port is the container port the application listens on.
                format: int32
                maximum: 65535
                minimum: 0
                type: integer
              projectName:
                description: |-
                  ProjectName is the project that owns this deployment. Corresponds to
                  the proto Deployment.project field.
                minLength: 1
                type: string
              tag:
                description: Tag is the container image tag.
                type: string
              templateRef:
                description: TemplateRef identifies the Template used to render this
                  Deployment.
                properties:
                  name:
                    description: Name is the referenced Template's DNS label slug.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the Kubernetes namespace that owns the
                      referenced Template.
                    minLength: 1
                    type: string
                required:
                - name
                - namespace
                type: object
              versionConstraint:
                description: |-
                  VersionConstraint is a semver range string (for example ">=2.0.0
                  <3.0.0") that restricts which release versions of the linked template
                  are compatible. Empty means no constraint; the latest version is used.
                type: string
            required:
            - projectName
            - templateRef
            type: object
          status:
            description: |-
              DeploymentStatus describes the observed state of a Deployment. Follows the
              Gateway-API status pattern recorded in ADR 030.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of this
                  Deployment's state. Known condition types are Accepted, ResolvedRefs,
                  and Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this
                  Deployment by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
