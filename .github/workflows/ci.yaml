name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install tool dependencies (buf)
        run: make tools

      - name: Go tests
        run: make test-go

      - name: UI unit tests
        run: make test-ui

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install tool dependencies (buf, mkcert)
        run: make tools

      - name: Trust mkcert CA
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3-tools
          mkcert -install

      - name: Generate TLS certificates
        run: make certs

      - name: Build Go binary
        run: make build

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sh -s - --disable=traefik
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> $GITHUB_ENV
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          # Wait for k3s to register a node before waiting for Ready condition
          for i in $(seq 1 30); do
            if kubectl get nodes -o name 2>/dev/null | grep -q .; then break; fi
            echo "Waiting for k3s node to register ($i/30)..."
            sleep 2
          done
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      # The controller-runtime manager embedded in holos-console (HOL-620) starts
      # informers over templates.holos.run/v1alpha1 at boot. The manager fails
      # its initial cache sync — and the console treats that as fatal — when
      # the target cluster does not have the CRDs installed. Apply the CRDs,
      # admission policies, and RBAC here, in the same order scripts/kind-up
      # uses for local clusters (ADR 030). Order matters: CRDs first so the
      # ValidatingAdmissionPolicies can reference templates.holos.run kinds.
      - name: Install holos-console CRDs, admission policies, and RBAC
        run: |
          kubectl apply -k config/holos-console/crd/
          kubectl apply -k config/holos-console/admission/
          kubectl apply -k config/holos-console/rbac/

      - name: Install Playwright browsers
        run: |
          cd frontend
          # Retry up to 3 times in case apt mirrors are slow or flaky.
          for i in 1 2 3; do
            if npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "playwright install attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/e2e/screenshots/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install tool dependencies (buf)
        run: make tools

      - name: Generate (builds frontend + protobuf)
        run: make generate

      - name: Go vet
        run: make vet

      # check-imports enforces the ADR 031 disjoint-tree invariant: no
      # cross-imports between internal/controller and internal/secretinjector.
      # Run in CI so a PR cannot silently merge a violation.
      - name: Check disjoint-tree invariant
        run: make check-imports
