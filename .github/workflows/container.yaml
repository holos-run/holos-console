name: Container

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to build (e.g., refs/tags/v1.2.3, refs/heads/main)'
        required: true
        type: string

jobs:
  buildx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    # Matrix publishes both the web-console image (holos-console) and the
    # secret-injection controller image (holos-console-secret-injector) from
    # the same job, mirroring the Makefile's docker-buildx-console /
    # docker-buildx-injector split. ADR 031 keeps the two binaries on
    # disjoint source trees; this workflow is the CI counterpart that keeps
    # their container images aligned on tag/SHA.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: holos-console
            image: ghcr.io/holos-run/holos-console
            dockerfile: Dockerfile.console
          - name: holos-secret-injector
            image: ghcr.io/holos-run/holos-console-secret-injector
            dockerfile: Dockerfile.secret-injector
    steps:
      - name: Set tag from trigger event
        id: opts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.git_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.opts.outputs.ref }}

      - name: SHA
        id: sha
        run: echo "sha=$(/usr/bin/git log -1 --format='%H')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Set Tags
        id: tags
        run: |
          echo "detail=$(/usr/bin/git describe --tags HEAD)" >> $GITHUB_OUTPUT
          echo "suffix=$(test -n "$(git status --porcelain)" && echo '-dirty' || echo '')" >> $GITHUB_OUTPUT
          echo "tag=$(/usr/bin/git describe --tags HEAD)$(test -n "$(git status --porcelain)" && echo '-dirty' || echo '')" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.tags.outputs.tag }}
            ${{ matrix.image }}:${{ steps.sha.outputs.sha }}${{ steps.tags.outputs.suffix }}

      - name: Setup Cosign to sign container images
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          cosign sign --yes ${{ matrix.image }}:${{ steps.tags.outputs.tag }}@${DIGEST}
          cosign sign --yes ${{ matrix.image }}:${{ steps.sha.outputs.sha }}${{ steps.tags.outputs.suffix }}@${DIGEST}

    outputs:
      tag: ${{ steps.tags.outputs.tag }}
      detail: ${{ steps.tags.outputs.detail }}

  release:
    needs: buildx
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.git_ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Set ref
        id: opts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.git_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.opts.outputs.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create GitHub Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
