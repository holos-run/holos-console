syntax = "proto3";

package holos.console.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// TemplatePolicyBindingService manages TemplatePolicyBinding resources, the
// explicit successor to TemplatePolicy's target-selector rules (ADR 029 /
// HOL-590). A TemplatePolicyBinding names a single policy and enumerates the
// project templates and deployments that policy applies to via
// TemplatePolicyBindingTargetRef entries. The literal string "*" is supported
// as a wildcard on both `name` and `project_name` fields (HOL-767 / ADR 029
// amendment), meaning "match every resource of this kind within the binding's
// reachable scope." TemplatePolicy continues to declare the REQUIRE/EXCLUDE
// rules; TemplatePolicyBinding declares the set of targets those rules apply
// to.
//
// Storage MUST live in a folder or organization namespace (`namespace`).
// Project-namespace storage is forbidden for the same reason it is forbidden
// for TemplatePolicy (HOL-554 storage-isolation design note); the policy a
// binding references is always folder- or org-scoped, so the binding lives
// in the same hierarchy level. The HOL-618 admission plugin enforces this
// by rejecting any TemplatePolicyBinding created in a project namespace.
//
// Handler wiring, RBAC enforcement, and ConnectRPC registration land in the
// follow-on sub-ticket (HOL-595). This file defines only the proto contract
// so subsequent phases have types to work against.
service TemplatePolicyBindingService {
  // ListTemplatePolicyBindings returns all TemplatePolicyBinding resources
  // visible in the given namespace. Requires
  // PERMISSION_TEMPLATE_POLICIES_LIST on the owning resource. Bindings reuse
  // the PERMISSION_TEMPLATE_POLICIES_* permission family because a binding
  // is meaningless without its policy — anyone who can read/write the policy
  // can read/write the set of targets it applies to (see HOL-595).
  rpc ListTemplatePolicyBindings(ListTemplatePolicyBindingsRequest) returns (ListTemplatePolicyBindingsResponse);

  // GetTemplatePolicyBinding retrieves a single binding by (namespace,
  // name). Requires PERMISSION_TEMPLATE_POLICIES_READ on the owning resource.
  rpc GetTemplatePolicyBinding(GetTemplatePolicyBindingRequest) returns (GetTemplatePolicyBindingResponse);

  // CreateTemplatePolicyBinding creates a new binding in the given
  // namespace. The namespace MUST be an organization or folder namespace;
  // admission (HOL-618) rejects project-namespace creates. Requires
  // PERMISSION_TEMPLATE_POLICIES_WRITE on the owning resource.
  rpc CreateTemplatePolicyBinding(CreateTemplatePolicyBindingRequest) returns (CreateTemplatePolicyBindingResponse);

  // UpdateTemplatePolicyBinding updates an existing binding. Requires
  // PERMISSION_TEMPLATE_POLICIES_WRITE on the owning resource.
  rpc UpdateTemplatePolicyBinding(UpdateTemplatePolicyBindingRequest) returns (UpdateTemplatePolicyBindingResponse);

  // DeleteTemplatePolicyBinding deletes a binding. Requires
  // PERMISSION_TEMPLATE_POLICIES_DELETE on the owning resource.
  rpc DeleteTemplatePolicyBinding(DeleteTemplatePolicyBindingRequest) returns (DeleteTemplatePolicyBindingResponse);
}

// LinkedTemplatePolicyRef is a (namespace, name) reference to a
// TemplatePolicy. A binding must reference exactly one policy; the
// referenced policy must live in a namespace the binding's owning namespace
// can reach (ancestor chain or the same namespace).
//
// HOL-619 collapsed the previous nested TemplateScopeRef discriminator into
// a flat (namespace, name) pair.
message LinkedTemplatePolicyRef {
  // namespace is the Kubernetes namespace that owns the referenced
  // TemplatePolicy. MUST be an organization or folder namespace —
  // TemplatePolicy cannot live in a project namespace.
  string namespace = 1;
  // name is the TemplatePolicy's DNS label slug within `namespace`.
  string name = 2;
}

// TemplatePolicyBindingTargetKind discriminates between the three explicit
// render targets a binding can name: a project-scope template (shared by
// every deployment in a project), a single deployment, or a project
// namespace (the to-be-created namespace for a new project).
enum TemplatePolicyBindingTargetKind {
  TEMPLATE_POLICY_BINDING_TARGET_KIND_UNSPECIFIED = 0;
  // TEMPLATE_POLICY_BINDING_TARGET_KIND_PROJECT_TEMPLATE targets a
  // project-scope Template. `name` is the template's DNS label slug
  // within its owning project; `project_name` is the project that owns
  // the template (required — project templates are scoped per-project,
  // so two projects may each host a template with the same name).
  TEMPLATE_POLICY_BINDING_TARGET_KIND_PROJECT_TEMPLATE = 1;
  // TEMPLATE_POLICY_BINDING_TARGET_KIND_DEPLOYMENT targets a single
  // Deployment. `name` is the deployment's DNS label slug within its
  // owning project; `project_name` is the project that owns the
  // deployment (required — deployments are scoped per-project).
  TEMPLATE_POLICY_BINDING_TARGET_KIND_DEPLOYMENT = 2;
  // TEMPLATE_POLICY_BINDING_TARGET_KIND_PROJECT_NAMESPACE targets the
  // namespace that will be created for a new project (HOL-806 / ADR 034).
  // `project_name` accepts the literal wildcard "*" (HOL-767) to match
  // every new project reachable via the binding's ancestor-walk. `name`
  // is the namespace slug (typically the project name). Resolver behavior
  // for this kind is wired in a later phase; the enum value is defined
  // here so downstream code has a typed value to reference.
  TEMPLATE_POLICY_BINDING_TARGET_KIND_PROJECT_NAMESPACE = 3;
}

// TemplatePolicyBindingTargetRef identifies one explicit render target a
// binding attaches its policy to. Project-scope: always paired with
// `project_name` so the resolver can disambiguate identically-named
// resources across projects.
message TemplatePolicyBindingTargetRef {
  // kind discriminates between PROJECT_TEMPLATE and DEPLOYMENT targets.
  TemplatePolicyBindingTargetKind kind = 1;
  // name is the target's DNS label slug within project_name, or the literal
  // string "*" to match every resource of this kind within the binding's
  // reachable scope (i.e., every resource in every project reachable via the
  // storage-scope ancestor-walk). Duplicate detection treats "*" as a literal
  // string: two entries with identical (kind, project_name, name="*") triples
  // are still duplicates and MUST be rejected by handlers (HOL-767 / ADR 029).
  string name = 2;
  // project_name is the project that owns the target, or the literal string
  // "*" to match targets across every project reachable via the binding's
  // storage-scope ancestor-walk. Required (non-empty, non-wildcard) for both
  // PROJECT_TEMPLATE and DEPLOYMENT kinds when naming a specific project;
  // set to "*" when the intent is to apply the policy to every project in the
  // binding's reachable scope. Left empty only on zero-valued UNSPECIFIED
  // placeholders, which handlers MUST reject; UNSPECIFIED is not a legal
  // resting state. Duplicate detection treats "*" as a literal string (HOL-767
  // / ADR 029).
  string project_name = 3;
}

// TemplatePolicyBinding is a named resource that binds a single
// TemplatePolicy to an explicit list of project templates and/or
// deployments. Introduces an explicit, non-glob target model that will
// supersede the glob-based TemplatePolicyRule.Target selector in HOL-599 /
// HOL-600 (ADR 029).
//
// Storage MUST live in a folder or organization namespace. Project-namespace
// storage is forbidden and enforced by the HOL-618 admission plugin.
message TemplatePolicyBinding {
  // name is the unique identifier (DNS label slug) within the namespace.
  string name = 1;
  // namespace is the Kubernetes namespace that owns this binding. MUST be
  // an organization or folder namespace.
  string namespace = 2;
  // display_name is a human-readable name for UI presentation.
  string display_name = 3;
  // description explains what the binding attaches and why.
  string description = 4;
  // policy_ref identifies the TemplatePolicy this binding attaches. A
  // binding references exactly one policy; use multiple bindings to
  // attach multiple policies to overlapping target sets.
  LinkedTemplatePolicyRef policy_ref = 5;
  // target_refs enumerates every render target the referenced policy applies
  // to. Order is not significant; duplicates MUST be rejected by handlers. A
  // "duplicate" is two entries with identical (kind, project_name, name)
  // triples — the literal string "*" is treated as a literal value for
  // duplicate detection purposes. Two entries that share (project_name, name)
  // but differ in kind (e.g., a PROJECT_TEMPLATE and a DEPLOYMENT with the
  // same slug inside the same project) are permitted — they name distinct
  // resources. The literal string "*" is a supported wildcard value on both
  // `name` and `project_name` fields (HOL-767 / ADR 029 amendment): a
  // project_name of "*" fans out to every project reachable via the binding's
  // ancestor-walk; a name of "*" fans out to every resource of the given kind
  // within the matched project(s).
  repeated TemplatePolicyBindingTargetRef target_refs = 6;
  // creator_email is the email address of the user who created this
  // binding. Server-populated from the authenticated caller on Create;
  // client-supplied values on Create and Update requests are ignored.
  string creator_email = 7;
  // created_at is the timestamp when this binding was created.
  google.protobuf.Timestamp created_at = 8;
}

// ListTemplatePolicyBindingsRequest requests all bindings visible in the
// given namespace.
message ListTemplatePolicyBindingsRequest {
  // namespace is the Kubernetes namespace that owns the bindings.
  string namespace = 1;
}

// ListTemplatePolicyBindingsResponse contains the list of bindings.
message ListTemplatePolicyBindingsResponse {
  repeated TemplatePolicyBinding bindings = 1;
}

// GetTemplatePolicyBindingRequest requests a single binding by (namespace,
// name).
message GetTemplatePolicyBindingRequest {
  // namespace is the Kubernetes namespace that owns the binding.
  string namespace = 1;
  // name is the binding's DNS label slug.
  string name = 2;
}

// GetTemplatePolicyBindingResponse contains the binding.
message GetTemplatePolicyBindingResponse {
  TemplatePolicyBinding binding = 1;
}

// CreateTemplatePolicyBindingRequest creates a new binding in the given
// namespace.
message CreateTemplatePolicyBindingRequest {
  // namespace is the Kubernetes namespace that will own the binding. MUST
  // be an organization or folder namespace.
  string namespace = 1;
  // binding is the binding to create. name, namespace, policy_ref, and
  // target_refs are required.
  TemplatePolicyBinding binding = 2;
}

// CreateTemplatePolicyBindingResponse contains the name of the created
// binding.
message CreateTemplatePolicyBindingResponse {
  string name = 1;
}

// UpdateTemplatePolicyBindingRequest updates an existing binding.
message UpdateTemplatePolicyBindingRequest {
  // namespace is the Kubernetes namespace that owns the binding.
  string namespace = 1;
  // binding carries the new values; name identifies which binding to
  // update.
  TemplatePolicyBinding binding = 2;
}

// UpdateTemplatePolicyBindingResponse is empty on success.
message UpdateTemplatePolicyBindingResponse {}

// DeleteTemplatePolicyBindingRequest deletes a binding.
message DeleteTemplatePolicyBindingRequest {
  // namespace is the Kubernetes namespace that owns the binding.
  string namespace = 1;
  // name is the binding's DNS label slug.
  string name = 2;
}

// DeleteTemplatePolicyBindingResponse is empty on success.
message DeleteTemplatePolicyBindingResponse {}
