syntax = "proto3";

package holos.console.v1;

import "google/protobuf/timestamp.proto";
import "holos/console/v1/policy_state.proto";

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// TemplatePolicyService manages TemplatePolicy resources, which declaratively
// attach templates to projects through REQUIRE/EXCLUDE rules. Policies replace
// the legacy `bool mandatory` flag previously carried on Template and
// LinkableTemplate (removed in HOL-555). The only way to force a template onto
// every project — or to block one from matching projects — is to author a
// TemplatePolicy.
//
// Storage MUST live in a folder or organization namespace (`namespace`).
// Project-namespace storage is forbidden and is enforced by the HOL-618
// admission plugin; a CEL policy rejects any TemplatePolicy object created
// in a project namespace so the proto layer no longer needs to carry a
// discriminator for that rejection (HOL-619).
//
// Backend handler wiring (HOL-556), storage enforcement, and render-time
// resolver integration (HOL-567) are complete; the resolver consults
// TemplatePolicy ConfigMaps to pin REQUIRE templates and suppress EXCLUDE
// templates for every matching project render.
service TemplatePolicyService {
  // ListTemplatePolicies returns all TemplatePolicy resources visible in the
  // given namespace. Requires PERMISSION_TEMPLATE_POLICIES_LIST on the
  // owning resource.
  rpc ListTemplatePolicies(ListTemplatePoliciesRequest) returns (ListTemplatePoliciesResponse);

  // GetTemplatePolicy retrieves a single policy by (namespace, name).
  // Requires PERMISSION_TEMPLATE_POLICIES_READ on the owning resource.
  rpc GetTemplatePolicy(GetTemplatePolicyRequest) returns (GetTemplatePolicyResponse);

  // CreateTemplatePolicy creates a new policy in the given namespace. The
  // namespace MUST be an organization or folder namespace; admission
  // (HOL-618) rejects project-namespace creates.
  // Requires PERMISSION_TEMPLATE_POLICIES_WRITE on the owning resource.
  rpc CreateTemplatePolicy(CreateTemplatePolicyRequest) returns (CreateTemplatePolicyResponse);

  // UpdateTemplatePolicy updates an existing policy.
  // Requires PERMISSION_TEMPLATE_POLICIES_WRITE on the owning resource.
  rpc UpdateTemplatePolicy(UpdateTemplatePolicyRequest) returns (UpdateTemplatePolicyResponse);

  // DeleteTemplatePolicy deletes a policy.
  // Requires PERMISSION_TEMPLATE_POLICIES_DELETE on the owning resource.
  rpc DeleteTemplatePolicy(DeleteTemplatePolicyRequest) returns (DeleteTemplatePolicyResponse);
}

// TemplatePolicyKind discriminates between REQUIRE and EXCLUDE rules.
enum TemplatePolicyKind {
  TEMPLATE_POLICY_KIND_UNSPECIFIED = 0;
  // TEMPLATE_POLICY_KIND_REQUIRE causes the referenced template to be
  // injected into the effective ref set when a deployment or project template
  // matching the target is rendered. It does not itself create, apply, or
  // delete any cluster resources — resources appear only as the output of the
  // user's deployment or project-template render.
  TEMPLATE_POLICY_KIND_REQUIRE = 1;
  // TEMPLATE_POLICY_KIND_EXCLUDE causes the referenced template to be
  // removed from the effective ref set when a deployment or project template
  // matching the target is rendered, even if it would otherwise be linked.
  // Like REQUIRE, it does not itself create, apply, or delete any cluster
  // resources — it only filters the render-time unification set.
  TEMPLATE_POLICY_KIND_EXCLUDE = 2;
}

// HOL-590 removed the legacy glob-based TemplatePolicyTarget semantics
// and the TemplatePolicyRule.target field. Render-time selection now
// runs through TemplatePolicyBinding (see template_policy_bindings.proto);
// a rule contributes to a render target only when a matching binding
// names its owning policy.
//
// TemplatePolicyTarget is kept as an empty, deprecated message so the
// top-level symbol name stays reserved at the schema level — a future
// revision cannot reintroduce a different shape under the same name
// without an explicit rename. The message has no fields and must not be
// produced or consumed by any current client; it exists purely as a
// compatibility marker. The TemplatePolicyRule.target field number (3)
// is reserved at the message level so its wire slot is never reused.
//
// See HOL-599 for the migration that translates legacy globs into
// bindings, and HOL-600 for the final cleanup.
message TemplatePolicyTarget {
  option deprecated = true;
  // Intentionally empty. Any fields from the pre-HOL-600 shape are
  // unrecoverable — the migration to TemplatePolicyBinding is the
  // supported upgrade path.
}

// TemplatePolicyRule binds a kind and a template reference into a single
// rule. A TemplatePolicy may carry many rules; which render targets a rule
// applies to is decided entirely by TemplatePolicyBinding objects.
message TemplatePolicyRule {
  // kind is REQUIRE or EXCLUDE.
  TemplatePolicyKind kind = 1;
  // template identifies the template this rule applies to. The referenced
  // template may live in any namespace the policy's owning namespace can
  // reach.
  LinkedTemplateRef template = 2;
  // Field 3 (target) was the legacy glob-based TemplatePolicyTarget that
  // HOL-600 removed. It is reserved so the number is never reused.
  reserved 3;
  reserved "target";
}

// TemplatePolicy is a named resource that declares one or more rules
// attaching templates to projects within its namespace.
//
// Storage MUST live in a folder or organization namespace. Project-namespace
// storage is forbidden and enforced by the HOL-618 admission plugin.
message TemplatePolicy {
  // name is the unique identifier (DNS label slug) within the namespace.
  string name = 1;
  // namespace is the Kubernetes namespace that owns this policy. MUST be an
  // organization or folder namespace — project namespaces are rejected by
  // admission.
  string namespace = 2;
  // display_name is a human-readable name for UI presentation.
  string display_name = 3;
  // description explains what the policy enforces.
  string description = 4;
  // rules are the REQUIRE/EXCLUDE rules this policy enforces. Rules are
  // evaluated independently and their effects are combined by the resolver.
  repeated TemplatePolicyRule rules = 5;
  // creator_email is the email address of the user who created this policy.
  string creator_email = 6;
  // created_at is the timestamp when this policy was created.
  google.protobuf.Timestamp created_at = 7;
}

// ListTemplatePoliciesRequest requests all policies visible in the given
// namespace.
message ListTemplatePoliciesRequest {
  // namespace is the Kubernetes namespace that owns the policies.
  string namespace = 1;
}

// ListTemplatePoliciesResponse contains the list of policies.
message ListTemplatePoliciesResponse {
  repeated TemplatePolicy policies = 1;
}

// GetTemplatePolicyRequest requests a single policy by (namespace, name).
message GetTemplatePolicyRequest {
  // namespace is the Kubernetes namespace that owns the policy.
  string namespace = 1;
  // name is the policy's DNS label slug.
  string name = 2;
}

// GetTemplatePolicyResponse contains the policy.
message GetTemplatePolicyResponse {
  TemplatePolicy policy = 1;
}

// CreateTemplatePolicyRequest creates a new policy in the given namespace.
message CreateTemplatePolicyRequest {
  // namespace is the Kubernetes namespace that will own the policy. MUST be
  // an organization or folder namespace.
  string namespace = 1;
  // policy is the policy to create. name, namespace, and rules are required.
  TemplatePolicy policy = 2;
}

// CreateTemplatePolicyResponse contains the name of the created policy.
message CreateTemplatePolicyResponse {
  string name = 1;
}

// UpdateTemplatePolicyRequest updates an existing policy.
message UpdateTemplatePolicyRequest {
  // namespace is the Kubernetes namespace that owns the policy.
  string namespace = 1;
  // policy carries the new values; name identifies which policy to update.
  TemplatePolicy policy = 2;
}

// UpdateTemplatePolicyResponse is empty on success.
message UpdateTemplatePolicyResponse {}

// DeleteTemplatePolicyRequest deletes a policy.
message DeleteTemplatePolicyRequest {
  // namespace is the Kubernetes namespace that owns the policy.
  string namespace = 1;
  // name is the policy's DNS label slug.
  string name = 2;
}

// DeleteTemplatePolicyResponse is empty on success.
message DeleteTemplatePolicyResponse {}
