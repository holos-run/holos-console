syntax = "proto3";

package holos.console.v1;

import "holos/console/v1/deployments.proto";
import "holos/console/v1/rbac.proto";

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// TemplateService is the single unified service for managing CUE-based templates
// at every hierarchy level (organization, folder, project). It replaces the
// separate DeploymentTemplateService and OrgTemplateService from v1alpha1
// (ADR 021 Decision 1).
//
// The TemplateScope enum and TemplateScopeRef message discriminate the level
// at which a template is stored and authored. All CRUD operations carry a
// TemplateScopeRef so the handler can locate the owning Kubernetes Namespace.
service TemplateService {
  // ListTemplates returns all templates the user can see in the given scope.
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);

  // GetTemplate retrieves a template by name within a scope.
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);

  // CreateTemplate creates a new template in the given scope.
  // Requires PERMISSION_TEMPLATES_WRITE on the owning scope.
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);

  // UpdateTemplate updates an existing template.
  // Requires PERMISSION_TEMPLATES_WRITE on the owning scope.
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);

  // DeleteTemplate deletes a template.
  // Requires PERMISSION_TEMPLATES_DELETE on the owning scope.
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);

  // RenderTemplate evaluates a CUE template with inputs and returns rendered
  // Kubernetes resource manifests. Supports draft (unsaved) templates.
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse);

  // CloneTemplate copies an existing template to a new name within the same scope.
  rpc CloneTemplate(CloneTemplateRequest) returns (CloneTemplateResponse);

  // ListLinkableTemplates returns all enabled templates in ancestor scopes that
  // the given scope may link against. For a project scope, this is all enabled
  // templates in parent folders and the organization. For a folder scope, it is
  // all enabled templates in parent folders and the organization above it.
  // Mandatory templates are included so the UI can display them as always-on.
  // Replaces ListLinkableOrgTemplates from v1alpha1 (ADR 021 Decision 7).
  rpc ListLinkableTemplates(ListLinkableTemplatesRequest) returns (ListLinkableTemplatesResponse);

  // ListAncestorTemplates returns templates from all ancestor scopes of the
  // given scope, including mandatory and enabled non-linked templates. Used by
  // the renderer to compute the effective template set.
  rpc ListAncestorTemplates(ListAncestorTemplatesRequest) returns (ListAncestorTemplatesResponse);
}

// TemplateScope identifies the hierarchy level at which a template is stored.
// (ADR 021 Decision 1)
enum TemplateScope {
  TEMPLATE_SCOPE_UNSPECIFIED = 0;
  // TEMPLATE_SCOPE_ORGANIZATION — authored by platform engineers.
  TEMPLATE_SCOPE_ORGANIZATION = 1;
  // TEMPLATE_SCOPE_FOLDER — authored by SREs.
  TEMPLATE_SCOPE_FOLDER = 2;
  // TEMPLATE_SCOPE_PROJECT — authored by product engineers.
  TEMPLATE_SCOPE_PROJECT = 3;
}

// TemplateScopeRef identifies the owning scope of a template.
// (ADR 021 Decision 1)
message TemplateScopeRef {
  // scope is the hierarchy level.
  TemplateScope scope = 1;
  // scope_name is the org name, folder name, or project name.
  string scope_name = 2;
}

// LinkedTemplateRef is a scope-qualified reference to a template used in the
// explicit linking list (ADR 021 Decision 5). Replaces the flat string list
// from v1alpha1's console.holos.run/linked-org-templates annotation.
message LinkedTemplateRef {
  // scope identifies the hierarchy level of the linked template.
  TemplateScope scope = 1;
  // scope_name is the org/folder/project name for the linked template.
  string scope_name = 2;
  // name is the template name.
  string name = 3;
}

// TemplateDefaults carries optional default values that a template provides
// for deployment form fields. All fields are optional — an empty message means
// "no defaults." Field types match the corresponding fields in
// CreateDeploymentRequest so defaults map 1:1 to form fields.
message TemplateDefaults {
  // image is the default container image (e.g. "ghcr.io/holos-run/holos-console").
  string image = 1;
  // tag is the default image tag (e.g. "latest").
  string tag = 2;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 3;
  // args overrides the container image CMD.
  repeated string args = 4;
  // env sets default container environment variables.
  repeated EnvVar env = 5;
  // port is the default container port the application listens on.
  int32 port = 6;
  // name is the default deployment name (DNS label slug).
  string name = 7;
  // description is a short human-readable description of the deployment.
  string description = 8;
}

// Template is a CUE template that produces Kubernetes resource manifests.
// It is stored as a Kubernetes ConfigMap in the namespace of its owning scope.
// (ADR 021 Decision 4)
message Template {
  // name is the unique identifier (DNS label slug) within the scope.
  string name = 1;
  // scope_ref identifies the owning scope (level + name).
  TemplateScopeRef scope_ref = 2;
  // display_name is a human-readable name.
  string display_name = 3;
  // description explains what the template produces.
  string description = 4;
  // cue_template is the CUE source code.
  string cue_template = 5;
  // defaults provides optional default values for deployment form fields.
  // Only meaningful for project-scope templates.
  TemplateDefaults defaults = 6;
  // linked_templates lists templates in ancestor scopes to unify with this
  // template at render time. Replaces linked_org_templates from v1alpha1.
  // Mandatory+enabled ancestor templates always unify regardless of this list.
  repeated LinkedTemplateRef linked_templates = 7;
  // mandatory indicates the template is automatically applied to every project
  // namespace at project creation time. Applicable to org and folder scopes.
  bool mandatory = 8;
  // enabled indicates whether this template is active. Disabled templates are
  // not applied to new project namespaces even if mandatory is true.
  bool enabled = 9;
}

// ListTemplatesRequest requests all templates visible in the given scope.
message ListTemplatesRequest {
  TemplateScopeRef scope = 1;
}

// ListTemplatesResponse contains the list of templates.
message ListTemplatesResponse {
  repeated Template templates = 1;
}

// GetTemplateRequest requests a single template by name within a scope.
message GetTemplateRequest {
  TemplateScopeRef scope = 1;
  string name = 2;
}

// GetTemplateResponse contains the template.
message GetTemplateResponse {
  Template template = 1;
}

// CreateTemplateRequest creates a new template in the given scope.
message CreateTemplateRequest {
  TemplateScopeRef scope = 1;
  Template template = 2;
}

// CreateTemplateResponse contains the name of the created template.
message CreateTemplateResponse {
  string name = 1;
}

// UpdateTemplateRequest updates an existing template.
message UpdateTemplateRequest {
  TemplateScopeRef scope = 1;
  Template template = 2;
}

// UpdateTemplateResponse is empty on success.
message UpdateTemplateResponse {}

// DeleteTemplateRequest deletes a template.
message DeleteTemplateRequest {
  TemplateScopeRef scope = 1;
  string name = 2;
}

// DeleteTemplateResponse is empty on success.
message DeleteTemplateResponse {}

// RenderTemplateRequest evaluates a CUE template unified with inputs and
// returns rendered Kubernetes resource manifests. Supports draft templates —
// the cue_template field is rendered directly without requiring a saved record.
// (ADR 021 Decision 6)
message RenderTemplateRequest {
  // scope identifies the owning scope for resolving ancestor templates.
  TemplateScopeRef scope = 1;
  // cue_template is the CUE source to evaluate. May be a draft (unsaved) value.
  string cue_template = 2;
  // cue_platform_input contains CUE source for platform-provided values
  // (project, namespace, folder ancestry, claims). Trusted; set by the backend
  // from authenticated context.
  string cue_platform_input = 3;
  // cue_project_input contains valid CUE source that is unified with
  // cue_template at the "input" path to supply concrete values for template
  // parameters matching the ProjectInput schema.
  string cue_project_input = 4;
  // linked_templates lists scope-qualified template references to include in
  // preview unification. Allows draft templates to preview their effective
  // rendering with the chosen linking list before saving.
  repeated LinkedTemplateRef linked_templates = 5;
}

// RenderTemplateResponse contains the rendered output in both formats.
message RenderTemplateResponse {
  // rendered_yaml is the concatenated multi-document YAML of all rendered
  // resources, separated by "---\n".
  string rendered_yaml = 1;
  // rendered_json is the pretty-printed JSON representation of all rendered
  // resources as a JSON array.
  string rendered_json = 2;
}

// CloneTemplateRequest copies an existing template to a new name within the same scope.
message CloneTemplateRequest {
  // scope identifies the owning scope.
  TemplateScopeRef scope = 1;
  // source_name is the name of the template to copy.
  string source_name = 2;
  // name is the DNS label slug for the new template.
  string name = 3;
  // display_name is the human-readable name for the new template.
  string display_name = 4;
}

// CloneTemplateResponse contains the name of the newly created template.
message CloneTemplateResponse {
  string name = 1;
}

// ListLinkableTemplatesRequest requests enabled templates in ancestor scopes
// that the given scope may explicitly link.
message ListLinkableTemplatesRequest {
  // scope is the starting scope (e.g. SCOPE_PROJECT for a project template).
  // The handler walks up the hierarchy and returns enabled ancestor templates.
  TemplateScopeRef scope = 1;
}

// LinkableTemplate describes a single template available for explicit linking.
message LinkableTemplate {
  // scope_ref identifies the scope that owns this template.
  TemplateScopeRef scope_ref = 1;
  // name is the template's DNS label slug.
  string name = 2;
  // display_name is the human-readable name.
  string display_name = 3;
  // description explains what the template produces.
  string description = 4;
  // mandatory indicates this template is always unified regardless of linking.
  // The UI renders mandatory templates as always-selected and disabled.
  bool mandatory = 5;
}

// ListLinkableTemplatesResponse returns the linkable templates.
message ListLinkableTemplatesResponse {
  repeated LinkableTemplate templates = 1;
}

// ListAncestorTemplatesRequest requests templates from all ancestor scopes.
message ListAncestorTemplatesRequest {
  // scope is the starting scope (e.g. SCOPE_PROJECT).
  TemplateScopeRef scope = 1;
}

// ListAncestorTemplatesResponse contains ancestor templates grouped by scope.
message ListAncestorTemplatesResponse {
  repeated Template templates = 1;
}
