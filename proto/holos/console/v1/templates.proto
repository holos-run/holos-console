syntax = "proto3";

package holos.console.v1;

import "google/protobuf/timestamp.proto";
import "holos/console/v1/deployments.proto";
import "holos/console/v1/policy_state.proto";

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// TemplateService is the single unified service for managing CUE-based templates
// at every hierarchy level (organization, folder, project). It replaces the
// separate DeploymentTemplateService and OrgTemplateService from v1alpha1
// (ADR 021 Decision 1).
//
// All CRUD operations carry a `namespace` that owns the template. The
// backend resolver classifies the namespace into its hierarchy kind
// (organization, folder, project) — callers do not supply the kind
// directly. HOL-619 replaced the earlier TemplateScope / TemplateScopeRef
// discriminator with this namespace-only model.
service TemplateService {
  // ListTemplates returns all templates the user can see in the given
  // namespace.
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);

  // GetTemplate retrieves a template by (namespace, name).
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);

  // CreateTemplate creates a new template in the given namespace.
  // Requires PERMISSION_TEMPLATES_WRITE on the owning resource.
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);

  // UpdateTemplate updates an existing template.
  // Requires PERMISSION_TEMPLATES_WRITE on the owning resource.
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);

  // DeleteTemplate deletes a template.
  // Requires PERMISSION_TEMPLATES_DELETE on the owning resource.
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);

  // RenderTemplate evaluates a CUE template with inputs and returns rendered
  // Kubernetes resource manifests. Supports draft (unsaved) templates.
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse);

  // CloneTemplate copies an existing template to a new name within the same
  // namespace.
  rpc CloneTemplate(CloneTemplateRequest) returns (CloneTemplateResponse);

  // ListLinkableTemplates returns all enabled templates in ancestor
  // namespaces that the given namespace may link against. For a project
  // namespace, this is all enabled templates in parent folders and the
  // organization. For a folder namespace, it is all enabled templates in
  // parent folders and the organization above it. Replaces
  // ListLinkableOrgTemplates from v1alpha1 (ADR 021 Decision 7).
  rpc ListLinkableTemplates(ListLinkableTemplatesRequest) returns (ListLinkableTemplatesResponse);

  // ListAncestorTemplates returns templates from all ancestor namespaces of
  // the given namespace. Used by the renderer to compute the effective
  // template set; TemplatePolicy REQUIRE rules (TemplatePolicyService) drive
  // which ancestor templates are forced onto the project.
  rpc ListAncestorTemplates(ListAncestorTemplatesRequest) returns (ListAncestorTemplatesResponse);

  // CreateRelease publishes a new versioned release of a template, capturing
  // the CUE source, defaults, changelog, and upgrade advice at a specific
  // semver version.
  rpc CreateRelease(CreateReleaseRequest) returns (CreateReleaseResponse);

  // ListReleases returns all releases for a template, ordered by version.
  rpc ListReleases(ListReleasesRequest) returns (ListReleasesResponse);

  // GetRelease retrieves a single release by (namespace, template_name,
  // version).
  rpc GetRelease(GetReleaseRequest) returns (GetReleaseResponse);

  // CheckUpdates returns available version updates for linked templates in a
  // given namespace, comparing current pinned versions against published
  // releases.
  rpc CheckUpdates(CheckUpdatesRequest) returns (CheckUpdatesResponse);

  // GetTemplateDefaults returns the defaults a template provides for
  // deployment form fields. The handler evaluates the template's `defaults`
  // CUE block via ExtractDefaults and returns the same TemplateDefaults
  // message that Template.defaults would carry on GetTemplate. Inline `*`
  // defaults declared on `input` fields are NOT read — only the top-level
  // `defaults` CUE block is considered. References ADR 027.
  //
  // This RPC gives the Create Deployment form an explicit, testable hook to
  // call on template selection and on the "Load defaults" action. It is
  // complementary to Template.defaults on list/get responses, which is
  // retained for backwards compatibility.
  rpc GetTemplateDefaults(GetTemplateDefaultsRequest) returns (GetTemplateDefaultsResponse);

  // GetProjectTemplatePolicyState returns the full TemplatePolicy drift
  // snapshot for a project-scope Template. Mirrors
  // DeploymentService.GetDeploymentPolicyState but keyed by
  // (project namespace, template name). Introduced in HOL-567.
  //
  // A dedicated RPC keeps list responses cheap and makes the drift query
  // symmetric with deployments.
  rpc GetProjectTemplatePolicyState(GetProjectTemplatePolicyStateRequest) returns (GetProjectTemplatePolicyStateResponse);

  // SearchTemplates returns templates visible to the caller across every
  // namespace scope (organization, folder, project), optionally filtered by
  // namespace, exact name, and a case-insensitive substring match against
  // the display name. Introduced in HOL-601 to power the Linear-style
  // navigation's unified Templates index — existing List*Templates RPCs
  // continue to serve the per-namespace surface.
  //
  // Unlike ListTemplates, this RPC does NOT require the caller to know
  // which namespace owns a template up front. The response includes each
  // template's owning namespace so the UI can render a flat, sortable table
  // across scopes without issuing N per-namespace calls.
  rpc SearchTemplates(SearchTemplatesRequest) returns (SearchTemplatesResponse);

  // ListTemplateExamples returns the built-in CUE example templates embedded
  // in the server binary. The UI picker uses this RPC to offer drop-in
  // starting points when creating a new template without hard-coding any
  // content on the frontend. Introduced in HOL-797.
  //
  // The request is intentionally empty — a filter string may be added in a
  // future revision. The response list is sorted by name ascending so the UI
  // can rely on a stable order without re-sorting.
  rpc ListTemplateExamples(ListTemplateExamplesRequest) returns (ListTemplateExamplesResponse);
}

// TemplateDefaults carries optional default values that a template provides
// for deployment form fields. All fields are optional — an empty message means
// "no defaults." Field types match the corresponding fields in
// CreateDeploymentRequest so defaults map 1:1 to form fields.
message TemplateDefaults {
  // image is the default container image (e.g. "ghcr.io/holos-run/holos-console").
  string image = 1;
  // tag is the default image tag (e.g. "latest").
  string tag = 2;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 3;
  // args overrides the container image CMD.
  repeated string args = 4;
  // env sets default container environment variables.
  repeated EnvVar env = 5;
  // port is the default container port the application listens on.
  int32 port = 6;
  // name is the default deployment name (DNS label slug).
  string name = 7;
  // description is a short human-readable description of the deployment.
  string description = 8;
}

// GetTemplateDefaultsRequest requests the defaults block for a template.
message GetTemplateDefaultsRequest {
  // namespace is the Kubernetes namespace that owns the template. Only
  // project namespaces carry meaningful defaults today, but this RPC is
  // accepted at any scope for symmetry; non-project namespaces return an
  // empty TemplateDefaults.
  string namespace = 1;
  // name is the template's DNS label slug.
  string name = 2;
}

// GetTemplateDefaultsResponse carries the evaluated template defaults.
message GetTemplateDefaultsResponse {
  // defaults is the TemplateDefaults message extracted from the template's
  // top-level `defaults` CUE block (see ADR 027). Optional: an unset or empty
  // message means the template provides no defaults.
  TemplateDefaults defaults = 1;
}

// Template is a CUE template that produces Kubernetes resource manifests.
// It is stored as a Kubernetes ConfigMap in the namespace identified by
// `namespace` (ADR 021 Decision 4).
message Template {
  // name is the unique identifier (DNS label slug) within the namespace.
  string name = 1;
  // namespace is the Kubernetes namespace that owns this template.
  string namespace = 2;
  // display_name is a human-readable name.
  string display_name = 3;
  // description explains what the template produces.
  string description = 4;
  // cue_template is the CUE source code.
  string cue_template = 5;
  // defaults provides optional default values for deployment form fields.
  // Only meaningful for project-namespace templates.
  TemplateDefaults defaults = 6;
  // linked_templates lists templates in ancestor namespaces to unify with
  // this template at render time. Replaces linked_org_templates from
  // v1alpha1. Ancestor templates forced onto a project by a TemplatePolicy
  // REQUIRE rule always unify regardless of this list.
  repeated LinkedTemplateRef linked_templates = 7;

  // Field 8 previously held `bool mandatory`. Removed in HOL-555 in favor of
  // TemplatePolicy REQUIRE rules (TemplatePolicyService). The number and name
  // are reserved to prevent silent reuse.
  reserved 8;
  reserved "mandatory";

  // enabled controls whether this template is eligible to appear in selection
  // lists and to participate in render-time unification. Disabled templates
  // are filtered out of linkable-template pickers and out of the effective
  // unification set computed when rendering a downstream template or
  // deployment. The flag never causes resources to be created on its own.
  bool enabled = 9;
  // version is the current semver version string (e.g. "1.2.3") of this
  // template. Empty means the template has no published version yet.
  string version = 10;
}

// ListTemplatesRequest requests all templates visible in the given namespace.
message ListTemplatesRequest {
  string namespace = 1;
}

// ListTemplatesResponse contains the list of templates.
message ListTemplatesResponse {
  repeated Template templates = 1;
}

// GetTemplateRequest requests a single template by (namespace, name).
message GetTemplateRequest {
  string namespace = 1;
  string name = 2;
}

// GetTemplateResponse contains the template.
message GetTemplateResponse {
  Template template = 1;
}

// CreateTemplateRequest creates a new template in the given namespace.
message CreateTemplateRequest {
  string namespace = 1;
  Template template = 2;
}

// CreateTemplateResponse contains the name of the created template.
message CreateTemplateResponse {
  string name = 1;
}

// UpdateTemplateRequest updates an existing template.
message UpdateTemplateRequest {
  string namespace = 1;
  Template template = 2;
  // update_linked_templates signals that the linked_templates field on the template
  // message should be written. When false (default), existing linked templates are
  // preserved regardless of the template.linked_templates value. When true, the
  // backend replaces the stored linked templates with template.linked_templates
  // and enforces scoped link permissions.
  bool update_linked_templates = 3;
}

// UpdateTemplateResponse is empty on success.
message UpdateTemplateResponse {}

// DeleteTemplateRequest deletes a template.
message DeleteTemplateRequest {
  string namespace = 1;
  string name = 2;
}

// DeleteTemplateResponse is empty on success.
message DeleteTemplateResponse {}

// RenderTemplateRequest evaluates a CUE template unified with inputs and
// returns rendered Kubernetes resource manifests. Supports draft templates —
// the cue_template field is rendered directly without requiring a saved record.
// (ADR 021 Decision 6)
message RenderTemplateRequest {
  // namespace is the Kubernetes namespace that owns the render target, used
  // to resolve ancestor templates.
  string namespace = 1;
  // cue_template is the CUE source to evaluate. May be a draft (unsaved) value.
  string cue_template = 2;
  // cue_platform_input contains CUE source for platform-provided values
  // (project, namespace, folder ancestry, claims). Trusted; set by the backend
  // from authenticated context.
  string cue_platform_input = 3;
  // cue_project_input contains valid CUE source that is unified with
  // cue_template at the "input" path to supply concrete values for template
  // parameters matching the ProjectInput schema.
  string cue_project_input = 4;
  // linked_templates lists (namespace, name) template references to include
  // in preview unification. Allows draft templates to preview their effective
  // rendering with the chosen linking list before saving.
  repeated LinkedTemplateRef linked_templates = 5;
}

// RenderTemplateResponse contains the rendered output in both formats.
message RenderTemplateResponse {
  // rendered_yaml is the concatenated multi-document YAML of all rendered
  // resources, separated by "---\n".
  string rendered_yaml = 1;
  // rendered_json is the pretty-printed JSON representation of all rendered
  // resources as a JSON array.
  string rendered_json = 2;
  // platform_resources_yaml contains resources from platformResources
  // (contributed by organization/folder-level templates) as multi-document YAML
  // separated by "---\n". Empty when no platform templates are linked or when
  // the template is rendered without ancestor templates.
  string platform_resources_yaml = 3;
  // platform_resources_json contains resources from platformResources
  // (contributed by organization/folder-level templates) as a JSON array.
  // Empty when no platform templates are linked or when the template is
  // rendered without ancestor templates.
  string platform_resources_json = 4;
  // project_resources_yaml contains resources from projectResources
  // (contributed by the project template) as multi-document YAML separated by
  // "---\n".
  string project_resources_yaml = 5;
  // project_resources_json contains resources from projectResources
  // (contributed by the project template) as a JSON array.
  string project_resources_json = 6;
  // defaults_json is the evaluated v1alpha2 ResourceSetSpec.defaults section as
  // a JSON object. Corresponds to the CUE path `defaults` in the unified
  // template output. Unset (absent) means render was not attempted or the
  // section does not exist; set to "null" or "{}" means evaluation succeeded
  // with that result.
  optional string defaults_json = 7;
  // platform_input_json is the evaluated v1alpha2 ResourceSetSpec.platformInput
  // section as a JSON object. Contains platform-provided values (project,
  // namespace, folder ancestry, claims). Unset means render was not attempted;
  // set means evaluation produced this value.
  optional string platform_input_json = 8;
  // project_input_json is the evaluated v1alpha2 ResourceSetSpec.projectInput
  // section as a JSON object. Contains user-provided values matching the
  // ProjectInput schema. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_input_json = 9;
  // platform_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.platformResources section as a JSON object. Unlike
  // platform_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string platform_resources_structured_json = 10;
  // project_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.projectResources section as a JSON object. Unlike
  // project_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_resources_structured_json = 11;
}

// CloneTemplateRequest copies an existing template to a new name within the
// same namespace.
message CloneTemplateRequest {
  // namespace is the Kubernetes namespace that owns the template.
  string namespace = 1;
  // source_name is the name of the template to copy.
  string source_name = 2;
  // name is the DNS label slug for the new template.
  string name = 3;
  // display_name is the human-readable name for the new template.
  string display_name = 4;
}

// CloneTemplateResponse contains the name of the newly created template.
message CloneTemplateResponse {
  string name = 1;
}

// ListLinkableTemplatesRequest requests enabled templates in ancestor
// namespaces that the given namespace may explicitly link.
message ListLinkableTemplatesRequest {
  // namespace is the starting namespace (e.g. a project namespace for a
  // project template). The handler walks up the hierarchy and returns enabled
  // ancestor templates.
  string namespace = 1;
  // include_self_scope, when true, also returns enabled templates at the
  // request's own namespace in addition to ancestor-namespace templates.
  // Default false preserves the existing semantics for project-template
  // linking UIs, which only link against ancestor-namespace templates. The
  // TemplatePolicy editor sets this to true so org-namespace policies can
  // pick org-namespace templates (there are no ancestors to pick from
  // otherwise) and folder-namespace policies can pick templates owned by the
  // same folder. See HOL-561.
  bool include_self_scope = 2;
}

// LinkableTemplate describes a single template available for explicit linking.
message LinkableTemplate {
  // namespace is the Kubernetes namespace that owns this template.
  string namespace = 1;
  // name is the template's DNS label slug.
  string name = 2;
  // display_name is the human-readable name.
  string display_name = 3;
  // description explains what the template produces.
  string description = 4;

  // Field 5 previously held `bool mandatory`. Removed in HOL-555 in favor of
  // TemplatePolicy REQUIRE rules (TemplatePolicyService). The number and name
  // are reserved to prevent silent reuse.
  reserved 5;
  reserved "mandatory";

  // releases carries the available published releases for this template, sorted
  // descending by version (newest first). Populated by ListLinkableTemplates so
  // the linking UI can display version choices without a separate RPC call.
  repeated Release releases = 6;

  // forced signals that a TemplatePolicy REQUIRE rule unconditionally
  // unifies this template with every matching project at render time, so
  // the linking UI MUST render it as selected and disabled when set.
  //
  // The server's current ListLinkableTemplates implementation does not
  // yet evaluate REQUIRE rules per candidate and therefore always returns
  // `forced=false`; render-time resolution in the folder resolver remains
  // the authoritative source of truth for "always applied" semantics.
  // When ListLinkableTemplates is taught to populate this field, it will
  // do so exclusively from TemplatePolicy evaluation — clients MUST NOT
  // infer `forced` from any template annotation.
  //
  // Clients MUST NOT treat `forced=true` as a permission to author the
  // template — it only describes render-time behavior for the UI.
  bool forced = 7;
}

// ListLinkableTemplatesResponse returns the linkable templates.
message ListLinkableTemplatesResponse {
  repeated LinkableTemplate templates = 1;
}

// ListAncestorTemplatesRequest requests templates from all ancestor
// namespaces of the given namespace.
message ListAncestorTemplatesRequest {
  // namespace is the starting namespace (e.g. a project namespace).
  string namespace = 1;
}

// ListAncestorTemplatesResponse contains ancestor templates.
message ListAncestorTemplatesResponse {
  repeated Template templates = 1;
}

// Release is a published, immutable snapshot of a template at a specific semver
// version. Releases enable consumers to pin to known-good versions and receive
// upgrade notifications through the CheckUpdates RPC.
message Release {
  // template_name is the DNS label slug of the template this release belongs to.
  string template_name = 1;
  // namespace is the Kubernetes namespace that owns the template.
  string namespace = 2;
  // version is the semver version string (e.g. "1.2.3").
  string version = 3;
  // changelog describes what changed in this release.
  string changelog = 4;
  // upgrade_advice provides guidance for consumers upgrading to this version,
  // especially for breaking changes.
  string upgrade_advice = 5;
  // cue_template is the CUE source code captured at the time of release.
  string cue_template = 6;
  // defaults are the template defaults captured at the time of release.
  TemplateDefaults defaults = 7;
  // created_at is the timestamp when this release was published.
  google.protobuf.Timestamp created_at = 8;
}

// TemplateUpdate describes an available version update for a linked template.
// Returned by CheckUpdates to help consumers decide whether to upgrade.
message TemplateUpdate {
  // ref is the linked template reference being checked.
  LinkedTemplateRef ref = 1;
  // current_version is the version currently pinned by the consumer.
  string current_version = 2;
  // latest_compatible_version is the newest release satisfying the version
  // constraint. Empty if no compatible update is available.
  string latest_compatible_version = 3;
  // latest_version is the absolute newest release regardless of constraints.
  string latest_version = 4;
  // breaking_update_available is true when a newer version exists that is
  // outside the current version constraint (i.e. a major version bump).
  bool breaking_update_available = 5;
}

// CreateReleaseRequest publishes a new release for a template.
message CreateReleaseRequest {
  // namespace is the Kubernetes namespace that owns the template.
  string namespace = 1;
  // release is the release to create. template_name, namespace, version,
  // cue_template, and defaults are required.
  Release release = 2;
}

// CreateReleaseResponse contains the created release.
message CreateReleaseResponse {
  Release release = 1;
}

// ListReleasesRequest requests all releases for a template.
message ListReleasesRequest {
  // namespace is the Kubernetes namespace that owns the template.
  string namespace = 1;
  // template_name is the DNS label slug of the template.
  string template_name = 2;
}

// ListReleasesResponse contains the list of releases ordered by version.
message ListReleasesResponse {
  repeated Release releases = 1;
}

// GetReleaseRequest requests a single release by (namespace, template_name,
// version).
message GetReleaseRequest {
  // namespace is the Kubernetes namespace that owns the template.
  string namespace = 1;
  // template_name is the DNS label slug of the template.
  string template_name = 2;
  // version is the semver version string to retrieve.
  string version = 3;
}

// GetReleaseResponse contains the requested release.
message GetReleaseResponse {
  Release release = 1;
}

// CheckUpdatesRequest asks for available updates for linked templates in a
// namespace.
message CheckUpdatesRequest {
  // namespace is the Kubernetes namespace whose linked templates should be
  // checked.
  string namespace = 1;
  // template_name is the template whose linked templates should be checked.
  // If empty, all templates in the namespace are checked.
  string template_name = 2;
  // include_current, when true, causes the response to include entries for
  // linked templates that are already at their latest compatible version (i.e.
  // no update available). This allows the version status indicator to display
  // resolved version information for ALL linked templates, not just those with
  // pending updates.
  bool include_current = 3;
}

// CheckUpdatesResponse returns available updates for linked templates.
message CheckUpdatesResponse {
  // updates lists each linked template that has an available update.
  repeated TemplateUpdate updates = 1;
}

// Note: PolicyState, GetDeploymentPolicyStateRequest/Response, and
// GetProjectTemplatePolicyStateRequest/Response messages live in
// policy_state.proto — alongside the LinkedTemplateRef foundational type —
// so both DeploymentService and TemplateService can register the
// corresponding RPCs without creating an import cycle. See
// policy_state.proto for message definitions.

// SearchTemplatesRequest requests templates matching the given filters across
// any namespace scope the caller can see. All filters are optional; omit a
// field to leave that dimension unconstrained. When every filter is empty
// the response lists every template visible to the caller across every scope
// (organization, folder, project). Introduced in HOL-601.
message SearchTemplatesRequest {
  // namespace, when non-empty, restricts results to templates owned by the
  // given Kubernetes namespace. Equivalent to ListTemplates(namespace) when
  // no other filters are set.
  string namespace = 1;
  // name, when non-empty, restricts results to templates whose DNS label
  // slug is an exact match. Combined with namespace this yields at most one
  // result and is equivalent to GetTemplate(namespace, name).
  string name = 2;
  // display_name_contains, when non-empty, is a case-insensitive substring
  // filter against Template.display_name. Empty means no display-name
  // filtering (matches every template).
  string display_name_contains = 3;
  // organization, when non-empty, restricts results to templates owned by a
  // namespace reachable from the given root organization. Intended for
  // multi-org deployments where the caller wants to scope a search to one
  // organization without enumerating every descendant namespace.
  string organization = 4;
}

// SearchTemplatesResponse contains matching templates. Each Template carries
// its own `namespace` field so callers can render a flat list across scopes
// without a separate lookup.
message SearchTemplatesResponse {
  // templates lists the matching templates in no guaranteed order. The
  // handler is free to page or truncate; this phase defines no cursor.
  repeated Template templates = 1;
}

// TemplateExample is a single built-in CUE example template returned by
// ListTemplateExamples. Each example provides enough information for the UI
// picker to display a card and seed the template editor with a working
// starting point.
message TemplateExample {
  // name is the URL-safe slug identifier (e.g. "httproute-v1").
  string name = 1;
  // display_name is the human-readable name shown in the UI picker card.
  string display_name = 2;
  // description is a short sentence describing what the example produces.
  string description = 3;
  // cue_template is the full CUE source the user will see in the editor when
  // they select this example.
  string cue_template = 4;
}

// ListTemplateExamplesRequest is intentionally empty. A filter string field
// may be added in a future revision without breaking existing callers.
message ListTemplateExamplesRequest {}

// ListTemplateExamplesResponse carries the list of built-in example templates
// sorted by name ascending.
message ListTemplateExamplesResponse {
  // examples lists all built-in example templates, sorted by name ascending.
  repeated TemplateExample examples = 1;
}
