syntax = "proto3";
package holos.console.v1;
import "holos/console/v1/deployment_templates.proto";
import "holos/console/v1/rbac.proto";
option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// OrgTemplateService manages org-scoped CUE-based platform templates.
// Platform templates differ from deployment templates in that they are scoped to
// an organization (not a project) and can be marked mandatory so they are
// automatically rendered and applied when a project is created.
service OrgTemplateService {
  rpc ListOrgTemplates(ListOrgTemplatesRequest) returns (ListOrgTemplatesResponse);
  rpc GetOrgTemplate(GetOrgTemplateRequest) returns (GetOrgTemplateResponse);
  rpc CreateOrgTemplate(CreateOrgTemplateRequest) returns (CreateOrgTemplateResponse);
  rpc UpdateOrgTemplate(UpdateOrgTemplateRequest) returns (UpdateOrgTemplateResponse);
  rpc DeleteOrgTemplate(DeleteOrgTemplateRequest) returns (DeleteOrgTemplateResponse);
  rpc RenderOrgTemplate(RenderOrgTemplateRequest) returns (RenderOrgTemplateResponse);
  rpc CloneOrgTemplate(CloneOrgTemplateRequest) returns (CloneOrgTemplateResponse);
}

// OrgTemplate is a CUE template stored in an org namespace ConfigMap that
// produces K8s resource manifests applied to project namespaces.
message OrgTemplate {
  // name is the unique identifier (DNS label slug) within the organization.
  string name = 1;
  // org is the parent organization name.
  string org = 2;
  // display_name is a human-readable name.
  string display_name = 3;
  // description explains what the template produces.
  string description = 4;
  // cue_template is the CUE source code.
  string cue_template = 5;
  // mandatory indicates that this template is automatically rendered and
  // applied to every project namespace at project creation time.
  bool mandatory = 6;
  // enabled indicates whether this template is active. Disabled templates are
  // not applied to new project namespaces even if mandatory is true.
  // Defaults to false (proto3 zero value) — new templates start disabled.
  bool enabled = 7;
}

message ListOrgTemplatesRequest {
  string org = 1;
}

message ListOrgTemplatesResponse {
  repeated OrgTemplate templates = 1;
}

message GetOrgTemplateRequest {
  string name = 1;
  string org = 2;
}

message GetOrgTemplateResponse {
  OrgTemplate template = 1;
}

message CreateOrgTemplateRequest {
  string name = 1;
  string org = 2;
  string display_name = 3;
  string description = 4;
  string cue_template = 5;
  bool mandatory = 6;
  bool enabled = 7;
}

message CreateOrgTemplateResponse {
  string name = 1;
}

message UpdateOrgTemplateRequest {
  string name = 1;
  string org = 2;
  optional string display_name = 3;
  optional string description = 4;
  optional string cue_template = 5;
  optional bool mandatory = 6;
  optional bool enabled = 7;
}

message UpdateOrgTemplateResponse {}

message DeleteOrgTemplateRequest {
  string name = 1;
  string org = 2;
}

message DeleteOrgTemplateResponse {}

// CloneOrgTemplateRequest copies an existing platform template to a new name.
// The clone inherits the CUE template and other fields from the source.
message CloneOrgTemplateRequest {
  // source_name is the name of the template to copy.
  string source_name = 1;
  // org is the organization that owns the source template.
  string org = 2;
  // name is the DNS label slug for the new template.
  string name = 3;
  // display_name is the human-readable name for the new template.
  string display_name = 4;
}

message CloneOrgTemplateResponse {
  // name is the name of the newly created template.
  string name = 1;
}

// RenderOrgTemplateRequest evaluates a CUE platform template unified with CUE
// input values and returns the rendered Kubernetes resource manifests as
// multi-document YAML and as a pretty-printed JSON array.
// The cue_template field is rendered directly (supports unsaved/draft templates).
message RenderOrgTemplateRequest {
  string cue_template = 2; // CUE source to evaluate
  // cue_platform_input contains CUE source for platform-provided values (org,
  // namespace, claims).  These values are trusted — set by the console backend
  // from authenticated context.  The claims field carries the OIDC ID token
  // claims of the authenticated user.
  string cue_platform_input = 7;
  // cue_input contains valid CUE source that is unified with cue_template at
  // the "input" path to supply concrete values for template parameters.
  string cue_input = 6;
}

// RenderOrgTemplateResponse contains the rendered output in both YAML and JSON formats.
message RenderOrgTemplateResponse {
  // rendered_yaml is the concatenated multi-document YAML of all rendered
  // resources, separated by "---\n".
  string rendered_yaml = 1;
  // rendered_json is the pretty-printed JSON representation of all rendered
  // resources as a JSON array.
  string rendered_json = 2;
}
