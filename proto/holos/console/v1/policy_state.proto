syntax = "proto3";

package holos.console.v1;

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// policy_state.proto carries the shared TemplatePolicy drift messages used by
// both DeploymentService and TemplateService (HOL-567). It also holds the
// LinkedTemplateRef foundational type so deployments.proto can reference it in
// PolicyState without creating an import cycle with templates.proto (which
// already imports deployments.proto for EnvVar).
//
// File-scope placement is transparent to generated Go and TypeScript:
// types remain in the `holos.console.v1` proto package and in the
// consolev1 Go package regardless of which file defines them. Proto consumers
// that import `holos.console.v1.LinkedTemplateRef` continue to resolve the
// same type.
//
// HOL-619 removed the TemplateScope enum and TemplateScopeRef message.
// Resources are now keyed by `(namespace, name)` — the containing Kubernetes
// namespace is the only parent signal. Admission plugins (HOL-618) reject
// TemplatePolicy and TemplatePolicyBinding objects in project namespaces so
// proto no longer needs a TEMPLATE_SCOPE_PROJECT carve-out.

// LinkedTemplateRef is a (namespace, name) reference to a template used in
// the explicit linking list (ADR 021 Decision 5). The resolver classifies
// the namespace into its hierarchy kind (organization, folder, project) at
// render time; callers supply the namespace only.
message LinkedTemplateRef {
  // namespace is the Kubernetes namespace that owns the linked template. The
  // resolver classifies the namespace into its hierarchy kind (organization,
  // folder, project) at render time — callers supply the namespace only.
  string namespace = 1;
  // name is the template name.
  string name = 2;
  // version_constraint is a semver range string (e.g. ">=2.0.0 <3.0.0") that
  // restricts which release versions of the linked template are compatible.
  // Empty means no constraint (latest version is used).
  string version_constraint = 3;
}

// PolicyState carries the full TemplatePolicy drift snapshot for a render
// target — either a Deployment or a project-scope Template. Shared between
// DeploymentService.GetDeploymentPolicyState and
// TemplateService.GetProjectTemplatePolicyState. Introduced in HOL-567.
//
// Fields are named so a single message can back both the deployment and the
// project-template surface. "Applied" refers to the render set recorded at
// the last successful Create/Update of the target; "current" refers to the
// effective set the resolver would produce if the target were rendered now.
// `drift` is (applied != current) semantically — when true at least one ref
// exists in `added_refs` or `removed_refs`.
message PolicyState {
  // applied_set is the effective set of LinkedTemplateRef values recorded at
  // the last successful render of the target. Empty (not unset) when the
  // target has never been rendered through the post-HOL-567 path.
  repeated LinkedTemplateRef applied_set = 1;
  // current_set is the effective set the PolicyResolver would return for
  // the target right now.
  repeated LinkedTemplateRef current_set = 2;
  // added_refs is the set of refs present in current_set but not in
  // applied_set — templates that policy now requires but were not applied.
  repeated LinkedTemplateRef added_refs = 3;
  // removed_refs is the set of refs present in applied_set but not in
  // current_set — templates that were applied but policy no longer
  // requires or explicitly excludes.
  repeated LinkedTemplateRef removed_refs = 4;
  // drift is true iff added_refs or removed_refs is non-empty.
  bool drift = 5;
  // has_applied_state distinguishes "never applied" (false, empty
  // applied_set) from "applied empty set" (true, empty applied_set). The
  // UI uses this to decide whether drift is meaningful: a target that has
  // never been rendered through the new path is not drifted, it is
  // un-initialized.
  bool has_applied_state = 6;
}

// GetDeploymentPolicyStateRequest requests the policy state snapshot for a
// single deployment. Registered on DeploymentService; the message lives here
// because it references PolicyState (which references LinkedTemplateRef).
message GetDeploymentPolicyStateRequest {
  // project is the project that owns the deployment.
  string project = 1;
  // name is the deployment name.
  string name = 2;
}

// GetDeploymentPolicyStateResponse returns the policy state for the
// deployment.
message GetDeploymentPolicyStateResponse {
  PolicyState state = 1;
}

// GetProjectTemplatePolicyStateRequest requests the policy state snapshot for
// a project-scope template. The `namespace` MUST classify as a project
// namespace — other kinds return InvalidArgument. This is the
// project-template counterpart to DeploymentService.GetDeploymentPolicyState.
message GetProjectTemplatePolicyStateRequest {
  // namespace is the Kubernetes namespace that owns the project-scope
  // template. The resolver classifies the namespace as a project namespace;
  // other classifications are rejected.
  string namespace = 1;
  // name is the template's DNS label slug within the project namespace.
  string name = 2;
}

// GetProjectTemplatePolicyStateResponse returns the policy state for the
// project-scope template.
message GetProjectTemplatePolicyStateResponse {
  PolicyState state = 1;
}
