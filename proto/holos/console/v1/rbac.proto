syntax = "proto3";

package holos.console.v1;

option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// Role represents the primitive roles for RBAC.
enum Role {
  // ROLE_UNSPECIFIED indicates no role was specified.
  ROLE_UNSPECIFIED = 0;
  // ROLE_VIEWER can read and list resources.
  ROLE_VIEWER = 1;
  // ROLE_EDITOR can read, list, and write resources.
  ROLE_EDITOR = 2;
  // ROLE_OWNER has full access including delete and admin operations.
  ROLE_OWNER = 3;
}

// Permission represents granular permissions for RBAC operations.
// v1alpha2: template permissions are collapsed to a single set applied
// uniformly at every scope level (ADR 021 Decision 2).
enum Permission {
  // PERMISSION_UNSPECIFIED indicates no permission was specified.
  PERMISSION_UNSPECIFIED = 0;
  // PERMISSION_SECRETS_READ allows reading secret data.
  PERMISSION_SECRETS_READ = 1;
  // PERMISSION_SECRETS_LIST allows listing secrets.
  PERMISSION_SECRETS_LIST = 2;
  // PERMISSION_SECRETS_WRITE allows creating and updating secrets.
  PERMISSION_SECRETS_WRITE = 3;
  // PERMISSION_SECRETS_DELETE allows deleting secrets.
  PERMISSION_SECRETS_DELETE = 4;
  // PERMISSION_SECRETS_ADMIN allows administrative operations on secrets.
  PERMISSION_SECRETS_ADMIN = 5;
  // PERMISSION_PROJECTS_READ allows reading project metadata.
  PERMISSION_PROJECTS_READ = 6;
  // PERMISSION_PROJECTS_LIST allows listing projects.
  PERMISSION_PROJECTS_LIST = 7;
  // PERMISSION_PROJECTS_WRITE allows updating project metadata.
  PERMISSION_PROJECTS_WRITE = 8;
  // PERMISSION_PROJECTS_DELETE allows deleting projects.
  PERMISSION_PROJECTS_DELETE = 9;
  // PERMISSION_PROJECTS_ADMIN allows administrative operations on projects.
  PERMISSION_PROJECTS_ADMIN = 10;
  // PERMISSION_PROJECTS_CREATE allows creating new projects.
  PERMISSION_PROJECTS_CREATE = 11;
  // PERMISSION_ORGANIZATIONS_READ allows reading organization metadata.
  PERMISSION_ORGANIZATIONS_READ = 12;
  // PERMISSION_ORGANIZATIONS_LIST allows listing organizations.
  PERMISSION_ORGANIZATIONS_LIST = 13;
  // PERMISSION_ORGANIZATIONS_WRITE allows updating organization metadata.
  PERMISSION_ORGANIZATIONS_WRITE = 14;
  // PERMISSION_ORGANIZATIONS_DELETE allows deleting organizations.
  PERMISSION_ORGANIZATIONS_DELETE = 15;
  // PERMISSION_ORGANIZATIONS_ADMIN allows administrative operations on organizations.
  PERMISSION_ORGANIZATIONS_ADMIN = 16;
  // PERMISSION_ORGANIZATIONS_CREATE allows creating new organizations.
  PERMISSION_ORGANIZATIONS_CREATE = 17;

  // Deployment permissions
  PERMISSION_DEPLOYMENTS_LIST = 18;
  PERMISSION_DEPLOYMENTS_READ = 19;
  PERMISSION_DEPLOYMENTS_WRITE = 20;
  PERMISSION_DEPLOYMENTS_DELETE = 21;
  PERMISSION_DEPLOYMENTS_ADMIN = 22;
  PERMISSION_DEPLOYMENTS_LOGS = 23;

  // Project settings permissions
  PERMISSION_PROJECT_SETTINGS_READ = 29;
  PERMISSION_PROJECT_SETTINGS_WRITE = 30;

  // Narrowly-scoped permission for enabling/disabling deployments on a project.
  // Granted to org-level OWNERs via cascade; designed for future project-level grants.
  PERMISSION_PROJECT_DEPLOYMENTS_ENABLE = 31;

  // Folder permissions (v1alpha2).
  // PERMISSION_FOLDERS_LIST allows listing folders.
  PERMISSION_FOLDERS_LIST = 33;
  // PERMISSION_FOLDERS_READ allows reading folder metadata.
  PERMISSION_FOLDERS_READ = 34;
  // PERMISSION_FOLDERS_WRITE allows creating and updating folders.
  PERMISSION_FOLDERS_WRITE = 35;
  // PERMISSION_FOLDERS_DELETE allows deleting folders.
  PERMISSION_FOLDERS_DELETE = 36;
  // PERMISSION_FOLDERS_ADMIN allows administrative operations on folders.
  PERMISSION_FOLDERS_ADMIN = 37;
  // PERMISSION_FOLDERS_CREATE allows creating new folders.
  PERMISSION_FOLDERS_CREATE = 38;

  // Collapsed template permissions (v1alpha2, ADR 021 Decision 2).
  // Uniform across every scope level (organization, folder, project).
  // The cascade table (TemplateCascadePerms) distinguishes scope; the enum does not.

  // PERMISSION_TEMPLATES_LIST allows listing template names.
  PERMISSION_TEMPLATES_LIST = 39;
  // PERMISSION_TEMPLATES_READ allows reading template CUE source.
  PERMISSION_TEMPLATES_READ = 40;
  // PERMISSION_TEMPLATES_WRITE allows creating and updating templates.
  PERMISSION_TEMPLATES_WRITE = 41;
  // PERMISSION_TEMPLATES_DELETE allows deleting templates.
  PERMISSION_TEMPLATES_DELETE = 42;
  // PERMISSION_TEMPLATES_ADMIN allows administrative operations on templates (IAM).
  PERMISSION_TEMPLATES_ADMIN = 43;

  // PERMISSION_REPARENT allows moving a folder or project to a different parent.
  // Required on BOTH the source parent and the destination parent. Granted only
  // to OWNERs — deliberately more restrictive than WRITE because reparenting
  // changes RBAC inheritance chains (ADR 022 Decision 4).
  PERMISSION_REPARENT = 44;

  // PERMISSION_TEMPLATES_LINK_ORG_WRITE allows adding or removing organization-level
  // linked template references on a template. Checked at the template's owning scope.
  PERMISSION_TEMPLATES_LINK_ORG_WRITE = 45;
  // PERMISSION_TEMPLATES_LINK_FOLDER_WRITE allows adding or removing folder-level
  // linked template references on a template. Checked at the template's owning scope.
  PERMISSION_TEMPLATES_LINK_FOLDER_WRITE = 46;
}
