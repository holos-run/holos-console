syntax = "proto3";
package holos.console.v1;
import "holos/console/v1/rbac.proto";
import "google/protobuf/timestamp.proto";
option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// DeploymentService manages application deployments.
service DeploymentService {
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
  rpc GetDeployment(GetDeploymentRequest) returns (GetDeploymentResponse);
  rpc CreateDeployment(CreateDeploymentRequest) returns (CreateDeploymentResponse);
  rpc UpdateDeployment(UpdateDeploymentRequest) returns (UpdateDeploymentResponse);
  rpc DeleteDeployment(DeleteDeploymentRequest) returns (DeleteDeploymentResponse);
  // GetDeploymentStatus returns the live status of deployed K8s resources.
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);
  // GetDeploymentLogs returns recent container logs.
  rpc GetDeploymentLogs(GetDeploymentLogsRequest) returns (GetDeploymentLogsResponse);
  // ListNamespaceSecrets lists Kubernetes Secrets available for env var references.
  rpc ListNamespaceSecrets(ListNamespaceSecretsRequest) returns (ListNamespaceSecretsResponse);
  // ListNamespaceConfigMaps lists Kubernetes ConfigMaps available for env var references.
  rpc ListNamespaceConfigMaps(ListNamespaceConfigMapsRequest) returns (ListNamespaceConfigMapsResponse);
  // GetDeploymentRenderPreview returns the CUE template source, platform input,
  // project input, and rendered output for a deployment. This gives the frontend
  // everything needed to display the template preview on the deployment detail page.
  rpc GetDeploymentRenderPreview(GetDeploymentRenderPreviewRequest) returns (GetDeploymentRenderPreviewResponse);
}

// Deployment represents a deployed application instance.
message Deployment {
  string name = 1;
  string project = 2;
  string image = 3;
  string tag = 4;
  // template is the name of the DeploymentTemplate used.
  string template = 5;
  // display_name is a human-readable name.
  string display_name = 6;
  // description explains the deployment's purpose.
  string description = 7;
  // phase is the current deployment phase.
  DeploymentPhase phase = 8;
  // message is a human-readable status message.
  string message = 9;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 10;
  // args overrides the container image CMD.
  repeated string args = 11;
  // env sets container environment variables.
  repeated EnvVar env = 12;
  // port is the container port the application listens on.
  int32 port = 13;
}

// DeploymentPhase represents the lifecycle phase of a deployment.
enum DeploymentPhase {
  DEPLOYMENT_PHASE_UNSPECIFIED = 0;
  DEPLOYMENT_PHASE_PENDING = 1;
  DEPLOYMENT_PHASE_RUNNING = 2;
  DEPLOYMENT_PHASE_FAILED = 3;
  DEPLOYMENT_PHASE_SUCCEEDED = 4;
}

// EnvVar represents a container environment variable.
message EnvVar {
  // name is the environment variable name.
  string name = 1;
  // source determines where the value comes from.
  oneof source {
    // value is a literal string value.
    string value = 2;
    // secret_key_ref references a key in a Kubernetes Secret.
    SecretKeyRef secret_key_ref = 3;
    // config_map_key_ref references a key in a Kubernetes ConfigMap.
    ConfigMapKeyRef config_map_key_ref = 4;
  }
}

// SecretKeyRef selects a key from a Kubernetes Secret.
message SecretKeyRef {
  // name is the Secret name.
  string name = 1;
  // key is the key within the Secret.
  string key = 2;
}

// ConfigMapKeyRef selects a key from a Kubernetes ConfigMap.
message ConfigMapKeyRef {
  // name is the ConfigMap name.
  string name = 1;
  // key is the key within the ConfigMap.
  string key = 2;
}

message ListDeploymentsRequest {
  string project = 1;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
}

message GetDeploymentRequest {
  string name = 1;
  string project = 2;
}

message GetDeploymentResponse {
  Deployment deployment = 1;
}

message CreateDeploymentRequest {
  string name = 1;
  string project = 2;
  string image = 3;
  string tag = 4;
  string template = 5;
  optional string display_name = 6;
  optional string description = 7;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 8;
  // args overrides the container image CMD.
  repeated string args = 9;
  // env sets container environment variables.
  repeated EnvVar env = 10;
  // port is the container port the application listens on.
  int32 port = 11;
}

message CreateDeploymentResponse {
  string name = 1;
}

message UpdateDeploymentRequest {
  string name = 1;
  string project = 2;
  // image and tag are the primary fields to update (re-deploy).
  optional string image = 3;
  optional string tag = 4;
  optional string display_name = 5;
  optional string description = 6;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 7;
  // args overrides the container image CMD.
  repeated string args = 8;
  // env sets container environment variables.
  repeated EnvVar env = 9;
  // port is the container port the application listens on.
  optional int32 port = 10;
}

message UpdateDeploymentResponse {}

message DeleteDeploymentRequest {
  string name = 1;
  string project = 2;
}

message DeleteDeploymentResponse {}

message GetDeploymentStatusRequest {
  string name = 1;
  string project = 2;
}

// DeploymentStatus contains live status from K8s resources.
message DeploymentStatus {
  // ready_replicas is the number of pods in Ready state.
  int32 ready_replicas = 1;
  // desired_replicas is the target replica count.
  int32 desired_replicas = 2;
  // available_replicas is the number available.
  int32 available_replicas = 3;
  // conditions are the K8s Deployment conditions.
  repeated DeploymentCondition conditions = 4;
  // pods contains per-pod status.
  repeated PodStatus pods = 5;
}

message DeploymentCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
}

message PodStatus {
  string name = 1;
  string phase = 2;
  bool ready = 3;
  int32 restart_count = 4;
}

message GetDeploymentStatusResponse {
  DeploymentStatus status = 1;
}

message GetDeploymentLogsRequest {
  string name = 1;
  string project = 2;
  // container is the container name (optional, defaults to first container).
  string container = 3;
  // tail_lines limits the number of lines returned from the end.
  int32 tail_lines = 4;
  // previous returns logs from the previous container instance if true.
  bool previous = 5;
}

message GetDeploymentLogsResponse {
  // logs is the raw log output.
  string logs = 1;
}

// NamespaceResource represents a Kubernetes resource with its available data keys.
message NamespaceResource {
  string name = 1;
  repeated string keys = 2;
}

message ListNamespaceSecretsRequest {
  string project = 1;
}

message ListNamespaceSecretsResponse {
  repeated NamespaceResource secrets = 1;
}

message ListNamespaceConfigMapsRequest {
  string project = 1;
}

message ListNamespaceConfigMapsResponse {
  repeated NamespaceResource config_maps = 1;
}

message GetDeploymentRenderPreviewRequest {
  // project is the project that owns the deployment.
  string project = 1;
  // name is the deployment name.
  string name = 2;
}

message GetDeploymentRenderPreviewResponse {
  // cue_template is the CUE template source used to render the deployment.
  string cue_template = 1;
  // cue_platform_input is the platform-provided CUE input (project, namespace,
  // folder ancestry, claims) in CUE format. Set by the backend from
  // authenticated context; template authors can trust these values.
  string cue_platform_input = 2;
  // cue_project_input is the user-provided CUE input (name, image, tag, etc.)
  // matching the ProjectInput schema.
  string cue_project_input = 3;
  // rendered_yaml is the rendered Kubernetes manifests as multi-document YAML.
  string rendered_yaml = 4;
  // rendered_json is the rendered Kubernetes manifests as a JSON array.
  string rendered_json = 5;
  // platform_resources_yaml contains resources from platformResources
  // (contributed by organization/folder-level templates) as multi-document YAML
  // separated by "---\n". Empty when no platform templates are linked or when
  // the template is rendered without ancestor templates.
  string platform_resources_yaml = 6;
  // platform_resources_json contains resources from platformResources
  // (contributed by organization/folder-level templates) as a JSON array.
  // Empty when no platform templates are linked or when the template is
  // rendered without ancestor templates.
  string platform_resources_json = 7;
  // project_resources_yaml contains resources from projectResources
  // (contributed by the project template) as multi-document YAML separated by
  // "---\n".
  string project_resources_yaml = 8;
  // project_resources_json contains resources from projectResources
  // (contributed by the project template) as a JSON array.
  string project_resources_json = 9;
  // defaults_json is the evaluated v1alpha2 ResourceSetSpec.defaults section as
  // a JSON object. Corresponds to the CUE path `defaults` in the unified
  // template output. Unset (absent) means render was not attempted or the
  // section does not exist; set to "null" or "{}" means evaluation succeeded
  // with that result.
  optional string defaults_json = 10;
  // platform_input_json is the evaluated v1alpha2 ResourceSetSpec.platformInput
  // section as a JSON object. Contains platform-provided values (project,
  // namespace, folder ancestry, claims). Unset means render was not attempted;
  // set means evaluation produced this value.
  optional string platform_input_json = 11;
  // project_input_json is the evaluated v1alpha2 ResourceSetSpec.projectInput
  // section as a JSON object. Contains user-provided values matching the
  // ProjectInput schema. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_input_json = 12;
  // platform_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.platformResources section as a JSON object. Unlike
  // platform_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string platform_resources_structured_json = 13;
  // project_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.projectResources section as a JSON object. Unlike
  // project_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_resources_structured_json = 14;
}
