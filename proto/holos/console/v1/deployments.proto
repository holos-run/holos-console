syntax = "proto3";
package holos.console.v1;
import "holos/console/v1/policy_state.proto";
import "holos/console/v1/rbac.proto";
import "google/protobuf/timestamp.proto";
option go_package = "github.com/holos-run/holos-console/gen/holos/console/v1;consolev1";

// DeploymentService manages application deployments.
service DeploymentService {
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
  rpc GetDeployment(GetDeploymentRequest) returns (GetDeploymentResponse);
  rpc CreateDeployment(CreateDeploymentRequest) returns (CreateDeploymentResponse);
  rpc UpdateDeployment(UpdateDeploymentRequest) returns (UpdateDeploymentResponse);
  rpc DeleteDeployment(DeleteDeploymentRequest) returns (DeleteDeploymentResponse);
  // GetDeploymentStatus returns the live status of deployed K8s resources.
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);
  // GetDeploymentStatusSummary returns a lightweight status summary suitable
  // for list views. Cheaper than GetDeploymentStatus; no pods or events.
  rpc GetDeploymentStatusSummary(GetDeploymentStatusSummaryRequest) returns (GetDeploymentStatusSummaryResponse);
  // GetDeploymentLogs returns recent container logs.
  rpc GetDeploymentLogs(GetDeploymentLogsRequest) returns (GetDeploymentLogsResponse);
  // ListNamespaceSecrets lists Kubernetes Secrets available for env var references.
  rpc ListNamespaceSecrets(ListNamespaceSecretsRequest) returns (ListNamespaceSecretsResponse);
  // ListNamespaceConfigMaps lists Kubernetes ConfigMaps available for env var references.
  rpc ListNamespaceConfigMaps(ListNamespaceConfigMapsRequest) returns (ListNamespaceConfigMapsResponse);
  // GetDeploymentRenderPreview returns the CUE template source, platform input,
  // project input, and rendered output for a deployment. This gives the frontend
  // everything needed to display the template preview on the deployment detail page.
  rpc GetDeploymentRenderPreview(GetDeploymentRenderPreviewRequest) returns (GetDeploymentRenderPreviewResponse);
  // GetDeploymentPolicyState returns the full TemplatePolicy drift snapshot
  // for a deployment: the applied render set (last recorded by
  // Create/UpdateDeployment), the current resolver output, and the
  // per-ref add/remove diff. Introduced in HOL-567 as the single source
  // of truth for "is this deployment drifted from policy?".
  rpc GetDeploymentPolicyState(GetDeploymentPolicyStateRequest) returns (GetDeploymentPolicyStateResponse);
  // PreflightCheck is a planning-time validation RPC that surfaces two
  // classes of conflict before the user clicks Apply:
  //
  //  (a) Sibling-Deployment name collisions — a planned Deployment shares its
  //      computed singleton name with an existing user-named Deployment in the
  //      same project namespace.
  //
  //  (b) versionConstraint conflicts — two or more dependents in the same
  //      project namespace pin incompatible version constraints on the same
  //      shared dependency template.  The conflict is detected with
  //      Go-module-style minimum version selection (Decision 9 in ADR 035):
  //      the resolver attempts to find a single version that satisfies every
  //      constraint; when none exists it reports a VersionConflictDetail.
  //
  // The RPC is safe to call before Apply. It MUST NOT mutate any cluster
  // state. Phase 9 (HOL-963) wires the deployment form to call it before
  // the user submits.
  rpc PreflightCheck(PreflightCheckRequest) returns (PreflightCheckResponse);
  // GetDependencyEdgeCascadeDelete returns the current Spec.CascadeDelete
  // value on the originating CRD (TemplateDependency or TemplateRequirement)
  // that materialised a dependency edge for one of the project's singleton
  // Deployments. Surfaced to the deployment detail page so the per-edge
  // cascade-delete toggle can reflect live state. RBAC: requires
  // deployments-read on the named project.
  rpc GetDependencyEdgeCascadeDelete(GetDependencyEdgeCascadeDeleteRequest) returns (GetDependencyEdgeCascadeDeleteResponse);
  // SetDependencyEdgeCascadeDelete writes Spec.CascadeDelete on the
  // originating CRD identified by `originating_object` to `cascade_delete`.
  // Treated as the per-edge form-control writer for HOL-991 — turning the
  // toggle off detaches the singleton's owner-ref from that dependent so
  // native Kubernetes GC will not reap the singleton when the dependent is
  // deleted (ADR-035 Decision 12 / HOL-954). RBAC: requires
  // deployments-write on the named project.
  rpc SetDependencyEdgeCascadeDelete(SetDependencyEdgeCascadeDeleteRequest) returns (SetDependencyEdgeCascadeDeleteResponse);
}

// Deployment represents a deployed application instance.
message Deployment {
  string name = 1;
  string project = 2;
  string image = 3;
  string tag = 4;
  // template is the name of the DeploymentTemplate used.
  string template = 5;
  // display_name is a human-readable name.
  string display_name = 6;
  // description explains the deployment's purpose.
  string description = 7;
  // phase is the current deployment phase.
  //
  // Deprecated: prefer status_summary.phase. The backend no longer populates
  // this field after the status cache rollout (#912); it remains only so
  // older clients deserialize without errors. The field number is retained
  // to preserve wire compatibility; do not remove or renumber.
  DeploymentPhase phase = 8 [deprecated = true];
  // message is a human-readable status message.
  //
  // Deprecated: prefer status_summary.message. The backend no longer
  // populates this field after the status cache rollout (#912); it remains
  // only so older clients deserialize without errors. The field number is
  // retained to preserve wire compatibility; do not remove or renumber.
  string message = 9 [deprecated = true];
  // command overrides the container image ENTRYPOINT.
  repeated string command = 10;
  // args overrides the container image CMD.
  repeated string args = 11;
  // env sets container environment variables.
  repeated EnvVar env = 12;
  // port is the container port the application listens on.
  int32 port = 13;
  // status_summary carries a lightweight status snapshot suitable for list
  // views. Populated by ListDeployments and GetDeployment via the cached
  // status summary path; unset on create/update responses. Supersedes the
  // deprecated `phase` (8) and `message` (9) fields; both are left in place
  // with [deprecated = true] to preserve wire compatibility.
  DeploymentStatusSummary status_summary = 14;
  // created_at is the RFC3339-formatted timestamp when the underlying Kubernetes
  // ConfigMap was created, sourced from metadata.creationTimestamp.
  string created_at = 15;
  // dependencies enumerates the resolved (template, version) edges that
  // materialised this Deployment as a shared singleton. Empty for ordinary
  // user-named Deployments. Each entry names the originating CRD object so
  // the UI can render a "shared dependency" indicator and link the row back
  // to its TemplateDependency or TemplateRequirement object. Sourced from
  // RenderState.spec.dependencies[] (HOL-961).
  repeated DeploymentDependency dependencies = 16;
}

// DeploymentDependency mirrors RenderStateDependency from
// templates.holos.run/v1alpha1: a single resolved (template, version) edge
// that materialised a Deployment as a shared singleton, plus a typed
// reference to the originating CRD object.
message DeploymentDependency {
  // template is the resolved (namespace, name, version_constraint) of the
  // singleton's backing Template.
  LinkedTemplateRef template = 1;
  // version is the resolved semver string (e.g. "v1.2.3") matched by the
  // version constraint at render time. Empty when the edge targets the live
  // (unversioned) Template.
  string version = 2;
  // originating_object names the CRD object that declared this edge.
  OriginatingObject originating_object = 3;
}

// OriginatingObject is a typed reference to the CRD that declared a
// dependency edge. The api_version is always
// "templates.holos.run/v1alpha1"; only kind discriminates between
// TemplateDependency and TemplateRequirement.
message OriginatingObject {
  // namespace is the Kubernetes namespace that owns the CRD object. For
  // TemplateDependency this is the project namespace; for
  // TemplateRequirement this is a folder or organization namespace.
  string namespace = 1;
  // name is the DNS label slug of the CRD object.
  string name = 2;
  // kind is "TemplateDependency" or "TemplateRequirement".
  string kind = 3;
}

// DeploymentPhase represents the lifecycle phase of a deployment.
enum DeploymentPhase {
  DEPLOYMENT_PHASE_UNSPECIFIED = 0;
  DEPLOYMENT_PHASE_PENDING = 1;
  DEPLOYMENT_PHASE_RUNNING = 2;
  DEPLOYMENT_PHASE_FAILED = 3;
  DEPLOYMENT_PHASE_SUCCEEDED = 4;
}

// EnvVar represents a container environment variable.
message EnvVar {
  // name is the environment variable name.
  string name = 1;
  // source determines where the value comes from.
  oneof source {
    // value is a literal string value.
    string value = 2;
    // secret_key_ref references a key in a Kubernetes Secret.
    SecretKeyRef secret_key_ref = 3;
    // config_map_key_ref references a key in a Kubernetes ConfigMap.
    ConfigMapKeyRef config_map_key_ref = 4;
  }
}

// SecretKeyRef selects a key from a Kubernetes Secret.
message SecretKeyRef {
  // name is the Secret name.
  string name = 1;
  // key is the key within the Secret.
  string key = 2;
}

// ConfigMapKeyRef selects a key from a Kubernetes ConfigMap.
message ConfigMapKeyRef {
  // name is the ConfigMap name.
  string name = 1;
  // key is the key within the ConfigMap.
  string key = 2;
}

message ListDeploymentsRequest {
  string project = 1;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
}

message GetDeploymentRequest {
  string name = 1;
  string project = 2;
}

message GetDeploymentResponse {
  Deployment deployment = 1;
}

message CreateDeploymentRequest {
  string name = 1;
  string project = 2;
  string image = 3;
  string tag = 4;
  string template = 5;
  optional string display_name = 6;
  optional string description = 7;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 8;
  // args overrides the container image CMD.
  repeated string args = 9;
  // env sets container environment variables.
  repeated EnvVar env = 10;
  // port is the container port the application listens on.
  int32 port = 11;
}

message CreateDeploymentResponse {
  string name = 1;
}

message UpdateDeploymentRequest {
  string name = 1;
  string project = 2;
  // image and tag are the primary fields to update (re-deploy).
  optional string image = 3;
  optional string tag = 4;
  optional string display_name = 5;
  optional string description = 6;
  // command overrides the container image ENTRYPOINT.
  repeated string command = 7;
  // args overrides the container image CMD.
  repeated string args = 8;
  // env sets container environment variables.
  repeated EnvVar env = 9;
  // port is the container port the application listens on.
  optional int32 port = 10;
}

message UpdateDeploymentResponse {}

message DeleteDeploymentRequest {
  string name = 1;
  string project = 2;
}

message DeleteDeploymentResponse {}

message GetDeploymentStatusRequest {
  string name = 1;
  string project = 2;
}

// DeploymentStatus contains live status from K8s resources.
message DeploymentStatus {
  // ready_replicas is the number of pods in Ready state.
  int32 ready_replicas = 1;
  // desired_replicas is the target replica count.
  int32 desired_replicas = 2;
  // available_replicas is the number available.
  int32 available_replicas = 3;
  // conditions are the K8s Deployment conditions.
  repeated DeploymentCondition conditions = 4;
  // pods contains per-pod status.
  repeated PodStatus pods = 5;
  // events contains Kubernetes events associated with the Deployment resource.
  repeated Event events = 6;
  // summary carries the lightweight status snapshot (phase, replica counts,
  // message) derived from the cached apps/v1.Deployment. Populated from the
  // same in-process informer cache used by ListDeployments and
  // GetDeploymentStatusSummary so all status RPCs share one derivation path.
  DeploymentStatusSummary summary = 7;
}

message DeploymentCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
}

message PodStatus {
  string name = 1;
  string phase = 2;
  bool ready = 3;
  int32 restart_count = 4;
  // container_statuses contains the status of each container in the pod.
  repeated ContainerStatus container_statuses = 5;
  // events contains Kubernetes events associated with this pod.
  repeated Event events = 6;
}

// Event represents a Kubernetes event associated with a resource.
message Event {
  // type is Normal or Warning.
  string type = 1;
  // reason is a short machine-readable reason (e.g., "Failed", "Pulling", "BackOff").
  string reason = 2;
  // message is the human-readable event message.
  string message = 3;
  // source is the component that reported the event (e.g., "kubelet", "default-scheduler").
  string source = 4;
  // count is the number of times this event has occurred.
  int32 count = 5;
  // first_seen is when this event was first recorded.
  google.protobuf.Timestamp first_seen = 6;
  // last_seen is when this event was most recently recorded.
  google.protobuf.Timestamp last_seen = 7;
  // involved_object_name is the name of the object this event is about (e.g., the pod name).
  string involved_object_name = 8;
}

// ContainerStatus represents the status of a container within a pod.
message ContainerStatus {
  // name is the container name.
  string name = 1;
  // state is the current state: "waiting", "running", or "terminated".
  string state = 2;
  // reason is the reason for the current state (e.g., "ImagePullBackOff", "CrashLoopBackOff").
  string reason = 3;
  // message is a human-readable message for the current state.
  string message = 4;
  // image is the container image.
  string image = 5;
  // ready indicates if the container is passing readiness checks.
  bool ready = 6;
  // restart_count is the number of times this container has restarted.
  int32 restart_count = 7;
  // started_at is when the container last started.
  google.protobuf.Timestamp started_at = 8;
}

message GetDeploymentStatusResponse {
  DeploymentStatus status = 1;
}

// DeploymentStatusSummary is a lightweight status snapshot derived from the
// live Deployment resource, augmented with the template-authored output
// section (e.g. app URL) cached on the deployment ConfigMap annotation.
// Intended for listing contexts where returning full pod and event detail
// would be too expensive and re-running the CUE render pipeline per row
// would be wasteful.
message DeploymentStatusSummary {
  // phase is the current deployment phase.
  DeploymentPhase phase = 1;
  // ready_replicas is the number of pods in Ready state.
  int32 ready_replicas = 2;
  // desired_replicas is the target replica count.
  int32 desired_replicas = 3;
  // available_replicas is the number of pods available.
  int32 available_replicas = 4;
  // updated_replicas is the number of pods updated to the latest spec.
  int32 updated_replicas = 5;
  // observed_generation is the last generation observed by the controller.
  int64 observed_generation = 6;
  // message is a human-readable status message.
  string message = 7;
  // output carries the template-authored output section (currently just the
  // app URL) captured at the last successful create/update render. Unset
  // when the template does not declare an output block, the URL is empty,
  // or the annotation cache has not yet been populated. Surfaced on listing
  // rows and GetDeploymentStatusSummary so the UI can render a link without
  // dispatching a per-row render-preview RPC.
  optional DeploymentOutput output = 8;
  // policy_drift signals that the effective TemplatePolicy resolver output
  // for this deployment no longer matches the render set last applied on
  // Create/UpdateDeployment. When true, the UI should offer a "re-render"
  // action so drift can be closed out; callers needing the full diff (what
  // was added, what was removed) invoke GetDeploymentPolicyState. Unset
  // means the comparison was not performed — typically because the
  // informer cache has not observed the deployment yet or the handler was
  // configured without a render-state client. Introduced in HOL-567.
  optional bool policy_drift = 9;
}

message GetDeploymentStatusSummaryRequest {
  string name = 1;
  string project = 2;
}

message GetDeploymentStatusSummaryResponse {
  DeploymentStatusSummary summary = 1;
}

message GetDeploymentLogsRequest {
  string name = 1;
  string project = 2;
  // container is the container name (optional, defaults to first container).
  string container = 3;
  // tail_lines limits the number of lines returned from the end.
  int32 tail_lines = 4;
  // previous returns logs from the previous container instance if true.
  bool previous = 5;
}

message GetDeploymentLogsResponse {
  // logs is the raw log output.
  string logs = 1;
}

// NamespaceResource represents a Kubernetes resource with its available data keys.
message NamespaceResource {
  string name = 1;
  repeated string keys = 2;
}

message ListNamespaceSecretsRequest {
  string project = 1;
}

message ListNamespaceSecretsResponse {
  repeated NamespaceResource secrets = 1;
}

message ListNamespaceConfigMapsRequest {
  string project = 1;
}

message ListNamespaceConfigMapsResponse {
  repeated NamespaceResource config_maps = 1;
}

message GetDeploymentRenderPreviewRequest {
  // project is the project that owns the deployment.
  string project = 1;
  // name is the deployment name.
  string name = 2;
}

message GetDeploymentRenderPreviewResponse {
  // cue_template is the CUE template source used to render the deployment.
  string cue_template = 1;
  // cue_platform_input is the platform-provided CUE input (project, namespace,
  // folder ancestry, claims) in CUE format. Set by the backend from
  // authenticated context; template authors can trust these values.
  string cue_platform_input = 2;
  // cue_project_input is the user-provided CUE input (name, image, tag, etc.)
  // matching the ProjectInput schema.
  string cue_project_input = 3;
  // rendered_yaml is the rendered Kubernetes manifests as multi-document YAML.
  string rendered_yaml = 4;
  // rendered_json is the rendered Kubernetes manifests as a JSON array.
  string rendered_json = 5;
  // platform_resources_yaml contains resources from platformResources
  // (contributed by organization/folder-level templates) as multi-document YAML
  // separated by "---\n". Empty when no platform templates are linked or when
  // the template is rendered without ancestor templates.
  string platform_resources_yaml = 6;
  // platform_resources_json contains resources from platformResources
  // (contributed by organization/folder-level templates) as a JSON array.
  // Empty when no platform templates are linked or when the template is
  // rendered without ancestor templates.
  string platform_resources_json = 7;
  // project_resources_yaml contains resources from projectResources
  // (contributed by the project template) as multi-document YAML separated by
  // "---\n".
  string project_resources_yaml = 8;
  // project_resources_json contains resources from projectResources
  // (contributed by the project template) as a JSON array.
  string project_resources_json = 9;
  // defaults_json is the evaluated v1alpha2 ResourceSetSpec.defaults section as
  // a JSON object. Corresponds to the CUE path `defaults` in the unified
  // template output. Unset (absent) means render was not attempted or the
  // section does not exist; set to "null" or "{}" means evaluation succeeded
  // with that result.
  optional string defaults_json = 10;
  // platform_input_json is the evaluated v1alpha2 ResourceSetSpec.platformInput
  // section as a JSON object. Contains platform-provided values (project,
  // namespace, folder ancestry, claims). Unset means render was not attempted;
  // set means evaluation produced this value.
  optional string platform_input_json = 11;
  // project_input_json is the evaluated v1alpha2 ResourceSetSpec.projectInput
  // section as a JSON object. Contains user-provided values matching the
  // ProjectInput schema. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_input_json = 12;
  // platform_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.platformResources section as a JSON object. Unlike
  // platform_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string platform_resources_structured_json = 13;
  // project_resources_structured_json is the evaluated v1alpha2
  // ResourceSetSpec.projectResources section as a JSON object. Unlike
  // project_resources_json (a flat array of extracted K8s resource objects),
  // this field preserves the full CUE struct with namespacedResources and
  // clusterResources nesting. Unset means render was not attempted; set means
  // evaluation produced this value.
  optional string project_resources_structured_json = 14;
  // output is the evaluated `output` section of the ResourceSetSpec,
  // populated when a template provides one. Unset means the template did
  // not declare an output block or render was not attempted.
  optional DeploymentOutput output = 15;
}

// DeploymentOutput carries the evaluated `output` section of the v1alpha2
// ResourceSetSpec. Templates assign concrete values here to publish data for
// the UI (e.g. the deployed application's URL) without stuffing it into
// annotations or labels.
message DeploymentOutput {
  // url is the primary URL the UI should show for the deployment. Empty when
  // the template has no meaningful URL to publish. The backend populates this
  // field from (in order of precedence) the `console.holos.run/primary-url`
  // annotation harvested from any owned resource, the cached
  // `console.holos.run/output-url` annotation written from the template's
  // `output.url`, or the rendered `output.url` itself when no annotation is
  // available.
  string url = 1;
  // links carries the full set of external links surfaced for a deployment,
  // aggregated from both Holos-authored annotations
  // (`console.holos.run/external-link.<name>`) and Argo CD-style annotations
  // (`link.argocd.argoproj.io/<name>`) on live Kubernetes resources owned by
  // the deployment. Order is not significant on the wire; the UI is expected
  // to apply its own ordering (e.g. primary first, then alphabetical by
  // title). Empty when the template declares no output links and no linkable
  // annotations are present on the deployment's resources. Strictly additive
  // to the existing `url` (field 1); older clients that only read `url`
  // continue to work unchanged.
  repeated Link links = 2;
}

// Link represents a single external link surfaced for a deployment.
// Links may be authored by the platform (via
// `console.holos.run/external-link.<name>` annotations on workload resources)
// or harvested from Argo CD-style `link.argocd.argoproj.io/<name>` annotations.
// Both sources are normalized into this message before being returned to the
// UI so a single rendering path handles all link origins.
message Link {
  // url is the absolute URL the link points to. Required; an empty url means
  // the annotation was present but carried no value, and the aggregator
  // should have dropped it before it ever reached the wire.
  string url = 1;
  // title is the human-readable label the UI displays for this link. Falls
  // back to the annotation suffix (`name`) when the authoring annotation did
  // not supply a title.
  string title = 2;
  // description is optional supplemental text the UI may render as a tooltip
  // or secondary line. Empty when the authoring annotation omitted a
  // description.
  string description = 3;
  // source identifies which annotation family produced this link.
  // Expected values are `"holos"` (for `console.holos.run/external-link.*`
  // annotations) and `"argocd"` (for `link.argocd.argoproj.io/*`
  // annotations). The string form is preferred over an enum so future
  // authoring conventions can be added without a proto migration, matching
  // the convention already established for
  // `DeploymentStatusSummary.message`.
  string source = 4;
  // name is the annotation-suffix identity for this link (for example, the
  // suffix `logs` in `console.holos.run/external-link.logs`). Used as a
  // stable de-duplication key when the same logical link is discovered
  // through multiple annotations on a deployment's resources.
  string name = 5;
}

// PlannedDeployment is a single deployment the caller intends to create or
// update. The PreflightCheck RPC validates the planned set against the
// existing project state.
message PlannedDeployment {
  // name is the deployment name the caller intends to use.
  string name = 1;
  // linked_template_ref is the (namespace, name) of the template backing
  // this planned deployment.
  LinkedTemplateRef linked_template_ref = 2;
  // version_constraint is the semver constraint the caller wants to pin.
  // Empty means no constraint.
  string version_constraint = 3;
}

// CollisionDetail describes a single sibling-Deployment name collision.
// A collision occurs when a planned deployment's computed singleton name
// (per Decision 3 of ADR 035) matches an existing user-named Deployment
// in the same project namespace.
message CollisionDetail {
  // planned_name is the name of the planned Deployment that triggered the
  // collision.
  string planned_name = 1;
  // conflicting_name is the existing Deployment name that collides.
  string conflicting_name = 2;
  // advice is a human-readable suggestion for resolving the conflict.
  string advice = 3;
}

// VersionConflictDetail describes an incompatible-versionConstraint conflict
// between two or more dependents that pin different constraints on the same
// shared dependency template.  The minimum version satisfying all constraints
// could not be determined.
message VersionConflictDetail {
  // template_namespace is the namespace of the shared dependency template.
  string template_namespace = 1;
  // template_name is the name of the shared dependency template.
  string template_name = 2;
  // constraints is the set of version-constraint expressions contributed by
  // the conflicting dependents.
  repeated string constraints = 3;
  // dependent_names lists the deployment names that contributed the
  // conflicting constraints.
  repeated string dependent_names = 4;
}

// PreflightCheckRequest carries the project identifier and the set of planned
// Deployments the caller intends to create or update. The backend validates
// the planned set against the current project state without mutating anything.
message PreflightCheckRequest {
  // project is the project that will own the planned deployments.
  string project = 1;
  // planned_deployments is the set of deployments the caller intends to
  // create or update.  At least one entry is required.
  repeated PlannedDeployment planned_deployments = 2;
}

// PreflightCheckResponse enumerates any conflicts found in the planned set.
// An empty response (no collisions, no version conflicts) means the plan is
// safe to apply.
message PreflightCheckResponse {
  // collisions lists sibling-Deployment name collisions between computed
  // singleton names and existing user-named Deployments in the project
  // namespace.
  repeated CollisionDetail collisions = 1;
  // version_conflicts lists incompatible versionConstraint conflicts between
  // dependents that pin different constraints on the same shared dependency.
  repeated VersionConflictDetail version_conflicts = 2;
}

// GetDependencyEdgeCascadeDeleteRequest reads the current Spec.CascadeDelete
// value on the originating CRD (TemplateDependency or TemplateRequirement)
// for a single dependency edge. The caller's project carries the RBAC scope.
message GetDependencyEdgeCascadeDeleteRequest {
  // project is the project the caller is currently scoped to. RBAC: caller
  // must hold deployments-read on this project.
  string project = 1;
  // originating_object identifies the CRD whose Spec.CascadeDelete value
  // is being read. The kind discriminates between TemplateDependency and
  // TemplateRequirement; namespace and name address the object.
  OriginatingObject originating_object = 2;
}

// GetDependencyEdgeCascadeDeleteResponse echoes the persisted value. Treats
// an unset Spec.CascadeDelete as true (the +kubebuilder:default=true on both
// CRD types) so callers do not have to know the API default.
message GetDependencyEdgeCascadeDeleteResponse {
  // cascade_delete is the live value of Spec.CascadeDelete; an unset CRD
  // field is reported as true to match the API-server default.
  bool cascade_delete = 1;
}

// SetDependencyEdgeCascadeDeleteRequest writes Spec.CascadeDelete on the
// originating CRD (TemplateDependency or TemplateRequirement) to a concrete
// value. The toggle is project-form scoped: the caller must hold
// deployments-write on `project` even when the originating CRD lives in a
// folder or organization namespace (per HOL-991, project owners are
// authoritative for cascade decoupling on edges that point into their
// project).
message SetDependencyEdgeCascadeDeleteRequest {
  // project is the project the caller is currently scoped to. RBAC: caller
  // must hold deployments-write on this project.
  string project = 1;
  // originating_object identifies the CRD whose Spec.CascadeDelete value
  // is being written. The kind discriminates between TemplateDependency and
  // TemplateRequirement; namespace and name address the object.
  OriginatingObject originating_object = 2;
  // cascade_delete is the desired value to persist. Both true and false are
  // explicit values — the field is non-optional on the wire so the toggle
  // cannot accidentally write "leave unspecified" semantics.
  bool cascade_delete = 3;
}

// SetDependencyEdgeCascadeDeleteResponse echoes the value persisted to the
// CRD so optimistic updates on the client can reconcile against the
// authoritative state without a follow-up read.
message SetDependencyEdgeCascadeDeleteResponse {
  // cascade_delete is the value persisted to Spec.CascadeDelete.
  bool cascade_delete = 1;
}
