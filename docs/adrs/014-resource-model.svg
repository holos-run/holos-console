<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <style>
    /* Default (light mode) */
    :root {
      --bg: #ffffff;
      --fg: #1f2328;
      --fg-muted: #656d76;
      --border: #d1d9e0;
      --accent-blue: #0969da;
      --accent-purple: #8250df;
      --accent-green: #1a7f37;
      --accent-orange: #bc4c00;
      --fill-blue: #ddf4ff;
      --fill-purple: #fbefff;
      --fill-green: #dafbe1;
      --fill-orange: #fff1e5;
      --fill-gray: #f6f8fa;
      --arrow: #656d76;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --border: #30363d;
        --accent-blue: #58a6ff;
        --accent-purple: #bc8cff;
        --accent-green: #3fb950;
        --accent-orange: #d29922;
        --fill-blue: #0d2240;
        --fill-purple: #1e1233;
        --fill-green: #0b2912;
        --fill-orange: #261d0e;
        --fill-gray: #161b22;
        --arrow: #8b949e;
      }
    }
    text { fill: var(--fg); }
    .muted { fill: var(--fg-muted); }
    .accent-blue { fill: var(--accent-blue); }
    .accent-purple { fill: var(--accent-purple); }
    .accent-green { fill: var(--accent-green); }
    .accent-orange { fill: var(--accent-orange); }
    .box { stroke: var(--border); stroke-width: 1.5; rx: 8; ry: 8; }
    .box-blue { fill: var(--fill-blue); }
    .box-purple { fill: var(--fill-purple); }
    .box-green { fill: var(--fill-green); }
    .box-orange { fill: var(--fill-orange); }
    .box-gray { fill: var(--fill-gray); }
    .arrow-line { stroke: var(--arrow); stroke-width: 1.5; fill: none; }
    .arrow-head { fill: var(--arrow); }
    .arrow-line-blue { stroke: var(--accent-blue); stroke-width: 1.5; fill: none; }
    .arrow-head-blue { fill: var(--accent-blue); }
    .arrow-line-green { stroke: var(--accent-green); stroke-width: 1.5; fill: none; }
    .arrow-head-green { fill: var(--accent-green); }
    .divider { stroke: var(--border); stroke-width: 1; stroke-dasharray: 6 4; }
    .bold { font-weight: 600; }
    .small { font-size: 11px; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 14px; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="900" height="680" fill="var(--bg)" rx="0"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">Configuration Management Resource Model</text>
  <text x="450" y="52" text-anchor="middle" class="muted small">How templates, inputs, and resource collections fit together</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN: Hierarchy + Templates                      -->
  <!-- ════════════════════════════════════════════════════════ -->

  <text x="170" y="82" text-anchor="middle" class="subtitle">Hierarchy &amp; Templates</text>
  <text x="170" y="98" text-anchor="middle" class="muted small">Who writes templates, and where</text>

  <!-- Organization level -->
  <rect x="30" y="114" width="280" height="68" class="box box-purple"/>
  <text x="48" y="136" class="bold accent-purple">Organization</text>
  <text x="48" y="154" class="small muted">Platform engineer writes templates here.</text>
  <text x="48" y="170" class="small muted">Policy for the entire org.</text>

  <!-- Arrow org → folder -->
  <line x1="170" y1="182" x2="170" y2="198" class="arrow-line"/>
  <polygon points="165,196 170,204 175,196" class="arrow-head"/>

  <!-- Folder level -->
  <rect x="30" y="206" width="280" height="68" class="box box-orange"/>
  <text x="48" y="228" class="bold accent-orange">Folder</text>
  <text x="48" y="246" class="small muted">SRE writes templates here.</text>
  <text x="48" y="262" class="small muted">Standards for a group of projects.</text>

  <!-- Arrow folder → project -->
  <line x1="170" y1="274" x2="170" y2="290" class="arrow-line"/>
  <polygon points="165,288 170,296 175,288" class="arrow-head"/>

  <!-- Project level -->
  <rect x="30" y="298" width="280" height="68" class="box box-blue"/>
  <text x="48" y="320" class="bold accent-blue">Project</text>
  <text x="48" y="338" class="small muted">Product engineer writes templates here.</text>
  <text x="48" y="354" class="small muted">Your app: image, ports, env vars.</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- CENTER: CUE Unification                                 -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Vertical divider -->
  <line x1="340" y1="72" x2="340" y2="400" class="divider"/>

  <!-- Unification box -->
  <rect x="365" y="170" width="170" height="74" class="box box-gray"/>
  <text x="450" y="196" text-anchor="middle" class="bold">CUE Unification</text>
  <text x="450" y="214" text-anchor="middle" class="small muted">All templates are merged</text>
  <text x="450" y="230" text-anchor="middle" class="small muted">into a single value.</text>

  <!-- Arrows from hierarchy levels to unification -->
  <!-- From org -->
  <path d="M310,148 Q338,148 365,192" class="arrow-line"/>
  <polygon points="363,188 368,196 371,187" class="arrow-head"/>
  <!-- From folder -->
  <line x1="310" y1="240" x2="365" y2="210" class="arrow-line"/>
  <polygon points="361,213 368,208 363,205" class="arrow-head"/>
  <!-- From project -->
  <path d="M310,332 Q338,332 365,228" class="arrow-line"/>
  <polygon points="363,232 368,225 371,233" class="arrow-head"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- RIGHT: Inputs                                           -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Vertical divider -->
  <line x1="560" y1="72" x2="560" y2="400" class="divider"/>

  <text x="730" y="82" text-anchor="middle" class="subtitle">Inputs</text>
  <text x="730" y="98" text-anchor="middle" class="muted small">Data provided to every template</text>

  <!-- platformInput -->
  <rect x="590" y="114" width="270" height="88" class="box box-purple"/>
  <text x="608" y="136" class="bold accent-purple">platformInput</text>
  <text x="608" y="152" class="small muted">Set by the backend (trusted).</text>
  <text x="608" y="172" class="small">namespace, organization, project</text>
  <text x="608" y="188" class="small">gatewayNamespace, claims (email, ...)</text>

  <!-- projectInput -->
  <rect x="590" y="218" width="270" height="88" class="box box-blue"/>
  <text x="608" y="240" class="bold accent-blue">projectInput</text>
  <text x="608" y="256" class="small muted">Set by the product engineer (user-supplied).</text>
  <text x="608" y="276" class="small">name, image, tag</text>
  <text x="608" y="292" class="small">command, args, env, port</text>

  <!-- Arrows from inputs to unification -->
  <line x1="590" y1="158" x2="535" y2="195" class="arrow-line"/>
  <polygon points="538,191 532,197 540,198" class="arrow-head"/>
  <line x1="590" y1="260" x2="535" y2="225" class="arrow-line"/>
  <polygon points="538,229 532,223 540,222" class="arrow-head"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Output resource collections                     -->
  <!-- ════════════════════════════════════════════════════════ -->

  <line x1="30" y1="410" x2="870" y2="410" class="divider"/>

  <text x="450" y="438" text-anchor="middle" class="subtitle">Output Resource Collections</text>
  <text x="450" y="454" text-anchor="middle" class="muted small">What gets applied to Kubernetes</text>

  <!-- Arrow from unification down to outputs -->
  <line x1="450" y1="244" x2="450" y2="390" class="arrow-line" stroke-dasharray="4 3"/>
  <polygon points="445,388 450,396 455,388" class="arrow-head"/>

  <!-- platformResources -->
  <rect x="30" y="472" width="410" height="188" class="box box-purple"/>
  <text x="48" y="496" class="bold accent-purple" font-size="14">platformResources</text>
  <text x="48" y="514" class="small muted">Written by org &amp; folder templates only.</text>
  <text x="48" y="530" class="small muted">Project templates cannot affect these.</text>

  <text x="48" y="556" class="small bold">Typical contents:</text>
  <text x="60" y="574" class="small">HTTPRoute in the gateway namespace</text>
  <text x="60" y="592" class="small">NetworkPolicy for the project namespace</text>
  <text x="60" y="610" class="small">ReferenceGrant (cross-namespace access)</text>
  <text x="60" y="628" class="small">ResourceQuota, LimitRange</text>
  <text x="60" y="646" class="small muted">Platform team controls these resources.</text>

  <!-- projectResources -->
  <rect x="460" y="472" width="410" height="188" class="box box-blue"/>
  <text x="478" y="496" class="bold accent-blue" font-size="14">projectResources</text>
  <text x="478" y="514" class="small muted">Written by the project template only.</text>
  <text x="478" y="530" class="small muted">Org &amp; folder templates can add constraints.</text>

  <text x="478" y="556" class="small bold">Typical contents:</text>
  <text x="490" y="574" class="small">Deployment (your application container)</text>
  <text x="490" y="592" class="small">Service (internal traffic routing)</text>
  <text x="490" y="610" class="small">ServiceAccount (pod identity)</text>
  <text x="490" y="628" class="small">ConfigMap, Secret (app configuration)</text>
  <text x="490" y="646" class="small muted">Product engineer controls these resources.</text>
</svg>
