<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="io-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="0">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="320" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- INPUTS heading -->
  <text x="170" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b" letter-spacing="0.08em">INPUTS</text>

  <!-- OUTPUTS heading -->
  <text x="610" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b" letter-spacing="0.08em">OUTPUTS</text>

  <!-- input box -->
  <rect x="30" y="48" width="280" height="120" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="170" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#6b21a8">input: #ProjectInput</text>
  <text x="170" y="94" text-anchor="middle" font-size="12" fill="#7c3aed">User-provided deployment parameters</text>
  <line x1="60" y1="106" x2="280" y2="106" stroke="#e9d5ff" stroke-width="1"/>
  <text x="50" y="124" font-size="12" fill="#64748b">name</text>
  <text x="120" y="124" font-size="12" fill="#64748b">image</text>
  <text x="180" y="124" font-size="12" fill="#64748b">tag</text>
  <text x="220" y="124" font-size="12" fill="#64748b">port</text>
  <text x="50" y="144" font-size="12" fill="#64748b">env</text>
  <text x="100" y="144" font-size="12" fill="#64748b">command</text>
  <text x="180" y="144" font-size="12" fill="#64748b">args</text>
  <text x="50" y="160" font-size="11" font-style="italic" fill="#a855f7">controlled by project owners</text>

  <!-- platform box -->
  <rect x="30" y="184" width="280" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">platform: #PlatformInput</text>
  <text x="170" y="230" text-anchor="middle" font-size="12" fill="#3b82f6">Server-injected trusted context</text>
  <line x1="60" y1="242" x2="280" y2="242" stroke="#bfdbfe" stroke-width="1"/>
  <text x="50" y="260" font-size="12" fill="#64748b">project</text>
  <text x="120" y="260" font-size="12" fill="#64748b">namespace</text>
  <text x="220" y="260" font-size="12" fill="#64748b">organization</text>
  <text x="50" y="280" font-size="12" fill="#64748b">gatewayNamespace</text>
  <text x="200" y="280" font-size="12" fill="#64748b">claims (email, sub, ...)</text>
  <text x="50" y="296" font-size="11" font-style="italic" fill="#3b82f6">cannot be overridden by user input</text>

  <!-- Arrow from inputs to outputs -->
  <line x1="310" y1="160" x2="460" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#io-arrow)"/>
  <rect x="345" y="144" width="78" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="384" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">CUE eval</text>

  <!-- projectResources box -->
  <rect x="470" y="48" width="280" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">projectResources</text>
  <text x="610" y="94" text-anchor="middle" font-size="12" fill="#22c55e">Project-owned Kubernetes resources</text>
  <line x1="500" y1="106" x2="720" y2="106" stroke="#bbf7d0" stroke-width="1"/>
  <text x="490" y="126" font-size="12" fill="#64748b">namespacedResources</text>
  <text x="490" y="146" font-size="12" fill="#64748b">clusterResources</text>
  <text x="490" y="160" font-size="11" font-style="italic" fill="#22c55e">both template levels contribute</text>

  <!-- platformResources box -->
  <rect x="470" y="184" width="280" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="610" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">platformResources</text>
  <text x="610" y="230" text-anchor="middle" font-size="12" fill="#3b82f6">Platform-owned Kubernetes resources</text>
  <line x1="500" y1="242" x2="720" y2="242" stroke="#bfdbfe" stroke-width="1"/>
  <text x="490" y="262" font-size="12" fill="#64748b">namespacedResources</text>
  <text x="490" y="282" font-size="12" fill="#64748b">clusterResources</text>
  <text x="490" y="296" font-size="11" font-style="italic" fill="#3b82f6">org-level templates only</text>
</svg>
